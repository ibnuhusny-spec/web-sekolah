<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Pegawai - Sekolah</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .search-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .search-box {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .search-box input {
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            flex: 1;
            min-width: 200px;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        .filter-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            background: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        .filter-btn:hover, .filter-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .teachers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .teacher-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease, opacity 0.5s ease;
            position: relative;
        }

        .teacher-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        /* Warna Badge Disesuaikan */
        .badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 5px 15px;
            border-radius: 20px;
            color: white;
            font-size: 0.8em;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .badge.guru-putra { background-color: #3182ce; } /* Biru */
        .badge.guru-putri { background-color: #d53f8c; } /* Pink */
        .badge.tendik { background-color: #38a169; }     /* Hijau */

        .teacher-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .teacher-info {
            padding: 25px;
        }

        .teacher-name {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 5px;
            line-height: 1.3;
        }

        .teacher-subject {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 1em;
        }

        .teacher-details {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }

        .detail-item {
            display: flex;
            margin-bottom: 10px;
            align-items: flex-start;
            font-size: 0.9em;
        }

        .detail-label {
            font-weight: 600;
            color: #555;
            width: 90px;
            flex-shrink: 0;
        }

        .detail-value {
            color: #333;
            flex: 1;
        }

        .contact-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
            text-align: center;
        }

        .contact-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        @media (max-width: 768px) {
            .teachers-grid {
                grid-template-columns: 1fr;
            }
            .search-box {
                flex-direction: column;
            }
            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>

        // ==========================================
        // 2. FUNGSI UNTUK MENCETAK KARTU KE HTML

        function renderCards() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            gridContainer.innerHTML = ""; // Bersihkan kontainer

            const filteredData = staffData.filter(staff => {
                const matchKategori = (currentKategori === 'semua') || (staff.kategori === currentKategori);
                const matchSearch = staff.nama.toLowerCase().includes(keyword) || 
                                    staff.jabatan.toLowerCase().includes(keyword);
                return matchKategori && matchSearch;
            });

            if(filteredData.length === 0) {
                gridContainer.innerHTML = `<h3 style="color:white; text-align:center; grid-column: 1 / -1;">Pencarian tidak ditemukan...</h3>`;
                return;
            }

            filteredData.forEach((staff, index) => {
                // Menentukan class warna dan teks berdasarkan kategori
                const badgeClass = staff.kategori.replace('_', '-');
                let badgeText = '';
                if(staff.kategori === 'guru_putra') badgeText = 'GURU PUTRA';
                else if(staff.kategori === 'guru_putri') badgeText = 'GURU PUTRI';
                else badgeText = 'TENDIK';

                const cardHTML = `
                    <div class="teacher-card" style="animation: fadeIn 0.5s ease forwards; animation-delay: ${index * 0.05}s; opacity: 0;">
                        <span class="badge ${badgeClass}">${badgeText}</span>
                        <img src="${staff.foto}" alt="${staff.nama}" class="teacher-img">
                        <div class="teacher-info">
                            <h2 class="teacher-name">${staff.nama}</h2>
                            <p class="teacher-subject">${staff.jabatan}</p>
                            <div class="teacher-details">
                                <div class="detail-item">
                                    <span class="detail-label">TTL:</span>
                                    <span class="detail-value">${staff.tempatLahir}, ${staff.tanggalLahir}</span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-label">Pendidikan:</span>
                                    <span class="detail-value">${staff.pendidikan}</span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-label">Bergabung:</span>
                                    <span class="detail-value">${staff.tanggalBergabung}</span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-label">Email:</span>
                                    <span class="detail-value">${staff.email}</span>
                                </div>
                            </div>
                            <a href="mailto:${staff.email}" class="contact-btn">Kirim Email</a>
                        </div>
                    </div>
                `;
                gridContainer.innerHTML += cardHTML;
            });
        }

        // ==========================================
        // 3. FUNGSI FILTER & TOMBOL
        // ==========================================
        function setKategori(kategori, btnElement) {
            currentKategori = kategori;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            renderCards();
        }

        function filterCards() {
            renderCards();
        }

        const styleSheet = document.createElement("style");
        styleSheet.innerText = `
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }
        `;
        document.head.appendChild(styleSheet);

        document.addEventListener('DOMContentLoaded', renderCards);
    </script>
</body>
</html>
