<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guru & Pegawai - SDIT Qurratu A'yun</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .menu-3d { transition: transform 0.3s, box-shadow 0.3s; }
        .menu-3d:hover { transform: perspective(500px) translateZ(20px) translateY(-5px); box-shadow: -10px 15px 25px rgba(0,0,0,0.2); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.5s ease forwards; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-marquee { display: inline-block; animation: marquee 25s linear infinite; }
        .animate-marquee:hover { animation-play-state: paused; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans flex flex-col min-h-screen">

    <nav class="fixed bottom-4 left-1/2 transform -translate-x-1/2 md:-translate-x-0 md:left-4 md:top-1/2 md:-translate-y-1/2 z-50 flex flex-row md:flex-col gap-2 md:gap-3 bg-slate-900/90 md:bg-transparent backdrop-blur-xl px-4 py-3 md:p-0 rounded-full md:rounded-none shadow-2xl md:shadow-none w-[95%] md:w-auto justify-between md:justify-start overflow-x-auto md:overflow-visible">
        <a href="index.html" class="menu-3d flex items-center justify-center w-12 h-12 md:w-14 md:h-14 bg-white/90 rounded-2xl shadow-lg border"><i class="fas fa-home text-blue-600 text-lg md:text-xl"></i></a>
        <a href="profil.html" class="menu-3d flex items-center justify-center w-12 h-12 md:w-14 md:h-14 bg-white/90 rounded-2xl shadow-lg border"><i class="fas fa-flag text-yellow-500 text-lg md:text-xl"></i></a>
        <a href="pegawai.html" class="menu-3d flex items-center justify-center w-12 h-12 md:w-14 md:h-14 bg-green-500 rounded-2xl shadow-lg border-green-400"><i class="fas fa-users text-white text-lg md:text-xl"></i></a>
        <a href="kelas.html" class="menu-3d flex items-center justify-center w-12 h-12 md:w-14 md:h-14 bg-white/90 rounded-2xl shadow-lg border"><i class="fas fa-chalkboard-teacher text-purple-500 text-lg md:text-xl"></i></a>
        <a href="karya.html" class="menu-3d flex items-center justify-center w-12 h-12 md:w-14 md:h-14 bg-white/90 rounded-2xl shadow-lg border"><i class="fas fa-lightbulb text-orange-500 text-lg md:text-xl"></i></a>
        <a href="berita.html" class="menu-3d flex items-center justify-center w-12 h-12 md:w-14 md:h-14 bg-white/90 rounded-2xl shadow-lg border"><i class="fas fa-newspaper text-red-500 text-lg md:text-xl"></i></a>
    </nav>

    <header class="bg-white shadow-sm p-4 md:pl-24 relative z-40 flex flex-col md:flex-row justify-center md:justify-start items-center"><div class="flex items-center gap-4"><img src="logo.png" class="h-12 w-auto" onerror="this.style.display='none'"><h1 class="text-xl md:text-2xl font-black text-blue-800 uppercase tracking-tight">SDIT Qurratu A'yun Al-Islami</h1></div></header>

    <div class="bg-yellow-400 overflow-hidden py-2 shadow-inner relative z-30">
        <div class="flex whitespace-nowrap animate-marquee" id="tickerContent"><span class="mx-4 font-bold text-blue-900 italic"><i class="fas fa-spinner fa-spin mr-2"></i> Memuat kabar terbaru...</span></div>
    </div>

    <main class="flex-1 px-4 py-10 pb-28 md:p-10 md:pb-10 md:ml-16 bg-gradient-to-br from-indigo-100 to-purple-100 min-h-screen">
        <h2 class="text-3xl md:text-4xl font-black mb-8 text-gray-800 border-l-8 border-green-500 pl-4">Guru & Pegawai</h2>
        
        <div class="bg-white p-4 rounded-2xl shadow-lg w-full max-w-lg mb-8 md:ml-0">
            <input type="text" id="searchInput" placeholder="Cari nama atau jabatan..." onkeyup="renderCards()" class="w-full p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-400">
        </div>

        <div class="flex flex-wrap gap-3 mb-10 overflow-x-auto pb-2">
            <button class="filter-btn flex-shrink-0 px-4 md:px-6 py-2 bg-white rounded-full font-bold shadow hover:bg-green-400 hover:text-white transition text-sm md:text-base" onclick="setKategori('semua', this)" id="btnSemua">Semua</button>
            <button class="filter-btn flex-shrink-0 px-4 md:px-6 py-2 bg-white rounded-full font-bold shadow hover:bg-green-400 hover:text-white transition text-sm md:text-base" onclick="setKategori('guru_putra', this)">Guru Putra</button>
            <button class="filter-btn flex-shrink-0 px-4 md:px-6 py-2 bg-white rounded-full font-bold shadow hover:bg-green-400 hover:text-white transition text-sm md:text-base" onclick="setKategori('guru_putri', this)">Guru Putri</button>
            <button class="filter-btn flex-shrink-0 px-4 md:px-6 py-2 bg-white rounded-full font-bold shadow hover:bg-green-400 hover:text-white transition text-sm md:text-base" onclick="setKategori('tendik', this)">Tendik</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8" id="staffGrid">
            <div class="text-gray-500 italic"><i class="fas fa-spinner fa-spin mr-2"></i> Mengambil data dari Firebase...</div>
        </div>
    </main>

    <footer class="bg-gray-900 text-white py-10 pb-28 md:pb-10 text-center relative z-40">
        <p class="text-lg font-bold">SDIT Qurratu A'yun Al-Islami</p>
        <button onclick="masukCMS()" class="mt-4 text-gray-500 text-xs hover:text-blue-400 transition flex items-center justify-center mx-auto gap-2"><i class="fas fa-cog"></i> Panel Admin</button>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMTI0R0xGEWFSOAhzDZdJxnuX8hixBP7M",
            authDomain: "websekolah-9bcde.firebaseapp.com",
            projectId: "websekolah-9bcde",
            storageBucket: "websekolah-9bcde.firebasestorage.app",
            messagingSenderId: "113406929634",
            appId: "1:113406929634:web:df2b9dc1a45fecf0bc0cbb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.staffData = [];
        window.currentKategori = 'semua';
        window.masukCMS = function() { window.location.href = 'login.html'; }

        function formatIndoDate(d) { try { return d && d!=="-" ? new Date(d).toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'}) : "-"; } catch{ return d; } }

        async function loadData() {
            try {
                const [beritaSnap, karyaSnap, pegawaiSnap] = await Promise.all([
                    getDocs(collection(db, "berita")), getDocs(collection(db, "karya")), getDocs(collection(db, "pegawai"))
                ]);

                // Ticker
                const ticker = document.getElementById('tickerContent');
                let berita = beritaSnap.docs.map(d => ({...d.data()})).sort((a,b) => b.tanggal.localeCompare(a.tanggal));
                let karya = karyaSnap.docs.map(d => ({...d.data()})).sort((a,b) => b.tanggal.localeCompare(a.tanggal));
                let items = [...berita.slice(0,3), ...karya.slice(0,3)];
                if(items.length > 0) {
                    let content = items.map(item => `<a href="${item.penulis ? 'karya.html' : 'berita.html'}" class="mx-10 text-blue-900 font-bold hover:text-red-600 transition"><i class="fas ${item.penulis ? 'fa-lightbulb text-orange-600' : 'fa-fire text-red-600'}"></i> ${item.judul} </a>`).join('');
                    ticker.innerHTML = content + content;
                } else { ticker.innerHTML = '<span class="mx-4 font-bold text-blue-900 italic">Belum ada pembaruan...</span>'; }

                // Pegawai
                window.staffData = pegawaiSnap.docs.map(d => d.data());
                window.renderCards();
            } catch (err) { console.error(err); }
        }

        window.renderCards = function() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const grid = document.getElementById('staffGrid');
            const filtered = window.staffData.filter(s => (window.currentKategori === 'semua' || s.kategori === window.currentKategori) && (s.nama.toLowerCase().includes(keyword) || s.jabatan.toLowerCase().includes(keyword)));

            if(filtered.length === 0) { grid.innerHTML = `<div class="text-gray-500 italic">Tidak ada data pegawai.</div>`; return; }

            grid.innerHTML = filtered.map((s, i) => {
                const colors = { guru_putra: 'bg-blue-500', guru_putri: 'bg-pink-500', tendik: 'bg-green-500' };
                const labels = { guru_putra: 'GURU PUTRA', guru_putri: 'GURU PUTRI', tendik: 'TENDIK' };
                return `
                    <div class="bg-white rounded-3xl overflow-hidden shadow-xl animate-fade" style="animation-delay: ${i*0.05}s">
                        <div class="relative h-64 md:h-72"><img src="${s.foto}" class="w-full h-full object-cover" onerror="this.src='https://i.ibb.co/Xz9Gf4z/default.png'"><span class="absolute top-4 right-4 px-4 py-1 rounded-full text-xs font-black text-white ${colors[s.kategori]}">${labels[s.kategori]}</span></div>
                        <div class="p-6 md:p-8"><h3 class="text-xl font-bold text-gray-800">${s.nama}</h3><p class="text-green-600 font-bold text-sm mb-4 uppercase">${s.jabatan}</p>
                            <div class="bg-gray-50 p-4 rounded-2xl text-[11px] md:text-xs space-y-2 border border-gray-100">
                                <div class="flex justify-between border-b pb-1"><b class="text-gray-500 uppercase">NUPTK</b> <span class="text-gray-800 font-medium text-right">${s.nuptk||"-"}</span></div>
                                <div class="flex justify-between border-b pb-1"><b class="text-gray-500 uppercase">TTL</b> <span class="text-gray-800 font-medium text-right">${s.tempatLahir}, ${formatIndoDate(s.tanggalLahir)}</span></div>
                                <div class="flex justify-between border-b pb-1"><b class="text-gray-500 uppercase">Pendidikan</b> <span class="text-gray-800 font-medium text-right">${s.pendidikan||"-"}</span></div>
                                <div class="flex justify-between"><b class="text-gray-500 uppercase">Tugas</b> <span class="text-gray-800 font-medium text-right">${formatIndoDate(s.tanggalBergabung)}</span></div>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        };

        window.setKategori = function(kat, btn) {
            window.currentKategori = kat;
            document.querySelectorAll('.filter-btn').forEach(b => { b.classList.remove('bg-green-400', 'text-white'); b.classList.add('bg-white'); });
            btn.classList.remove('bg-white'); btn.classList.add('bg-green-400', 'text-white');
            window.renderCards();
        };

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('btnSemua').classList.add('bg-green-400', 'text-white');
            loadData();
        });
    </script>
</body>
</html>
