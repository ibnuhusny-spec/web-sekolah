<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS Admin - SDIT Qurratu A'yun</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen">

    <div class="flex">
        <aside class="w-64 bg-slate-900 h-screen sticky top-0 text-white p-6 shadow-2xl">
            <div class="flex items-center gap-3 mb-10 border-b border-slate-700 pb-6">
                <img src="logo.png" class="h-8 bg-white rounded-full p-1">
                <span class="font-bold text-sm tracking-widest uppercase">Admin Panel</span>
            </div>
            <nav class="space-y-4">
                <button onclick="switchTab('pegawai')" class="w-full flex items-center gap-3 p-3 bg-blue-600 rounded-xl font-bold transition">
                    <i class="fas fa-users"></i> Data Pegawai
                </button>
                <button onclick="switchTab('profil')" class="w-full flex items-center gap-3 p-3 hover:bg-slate-800 rounded-xl transition text-slate-400">
                    <i class="fas fa-edit"></i> Edit Profil
                </button>
                <a href="index.html" class="block flex items-center gap-3 p-3 text-red-400 mt-20"><i class="fas fa-power-off"></i> Keluar</a>
            </nav>
        </aside>

        <main class="flex-1 p-10">
            <div id="tab-pegawai">
                <h2 class="text-3xl font-black text-slate-800 mb-8">Kelola Guru & Pegawai</h2>
                
                <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-100 mb-10">
                    <form id="formPegawai" class="grid grid-cols-2 gap-6">
                        <div class="col-span-1">
                            <label class="block text-xs font-black uppercase text-gray-400 mb-2">Nama Lengkap</label>
                            <input type="text" id="nama" class="w-full p-3 bg-gray-50 border-2 rounded-xl focus:border-blue-500 outline-none" required>
                        </div>
                        <div>
                            <label class="block text-xs font-black uppercase text-gray-400 mb-2">Kategori</label>
                            <select id="kategori" class="w-full p-3 bg-gray-50 border-2 rounded-xl outline-none">
                                <option value="guru_putra">Guru Putra</option>
                                <option value="guru_putri">Guru Putri</option>
                                <option value="tendik">Tendik</option>
                            </select>
                        </div>
                        <div class="col-span-1">
                            <label class="block text-xs font-black uppercase text-gray-400 mb-2">Jabatan</label>
                            <input type="text" id="jabatan" class="w-full p-3 bg-gray-50 border-2 rounded-xl outline-none" required>
                        </div>
                        <div class="col-span-1">
                            <label class="block text-xs font-black uppercase text-gray-400 mb-2">Pendidikan</label>
                            <input type="text" id="pendidikan" class="w-full p-3 bg-gray-50 border-2 rounded-xl outline-none" required>
                        </div>
                        <div class="col-span-2">
                            <label class="block text-xs font-black uppercase text-gray-400 mb-2">URL Foto (ImgBB Direct Link)</label>
                            <input type="url" id="foto" class="w-full p-3 bg-gray-50 border-2 rounded-xl outline-none" required>
                        </div>
                        <button type="button" onclick="simpanData()" id="btnSimpan" class="col-span-2 bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-blue-700 transition">
                            SIMPAN DATA KE GOOGLE SHEETS
                        </button>
                    </form>
                </div>
            </div>

            <div id="tab-profil" class="hidden">
                <h2 class="text-3xl font-black text-slate-800 mb-8">Edit Profil Sekolah</h2>
                <p class="text-gray-500 italic">Fitur pengeditan profil via CMS sedang dikembangkan. Untuk sementara, ubahlah langsung di Google Sheets tab "Profil".</p>
            </div>
        </main>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwWPntN4_oJssDtiuUtC7ipHYDjCeqdrEeYHuCfUXQ03Vl5OmJQ3JdZJP9e_zyMx1dy/exec"; 

        async function simpanData() {
            const btn = document.getElementById('btnSimpan');
            const formData = {
                kategori: document.getElementById('kategori').value,
                nama: document.getElementById('nama').value,
                jabatan: document.getElementById('jabatan').value,
                pendidikan: document.getElementById('pendidikan').value,
                foto: document.getElementById('foto').value,
                email: "admin@sekolah.com", // Default
                tempatLahir: "-", tanggalLahir: "-", tanggalBergabung: "-" 
            };

            btn.innerText = "SEDANG MENGIRIM...";
            btn.disabled = true;

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Penting untuk Apps Script
                    body: JSON.stringify(formData)
                });
                alert("Data Berhasil Terkirim ke Spreadsheet!");
                document.getElementById('formPegawai').reset();
            } catch (err) {
                alert("Gagal mengirim data. Coba lagi.");
            } finally {
                btn.innerText = "SIMPAN DATA KE GOOGLE SHEETS";
                btn.disabled = false;
            }
        }

        function switchTab(tab) {
            if(tab === 'profil') {
                document.getElementById('tab-pegawai').classList.add('hidden');
                document.getElementById('tab-profil').classList.remove('hidden');
            } else {
                document.getElementById('tab-pegawai').classList.remove('hidden');
                document.getElementById('tab-profil').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
