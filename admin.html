<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>CMS SDIT Qurratu A'yun</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex min-h-screen">
    <aside class="w-64 bg-slate-900 text-white p-6 sticky top-0 h-screen flex flex-col">
        <div class="mb-10 text-center font-black text-blue-400 uppercase tracking-widest border-b border-slate-700 pb-4">Panel Kontrol</div>
        <nav class="space-y-2 flex-1">
            <button onclick="switchTab('pegawai')" id="nav-pegawai" class="w-full text-left p-4 bg-blue-600 rounded-xl font-bold transition"><i class="fas fa-users mr-3"></i>Pegawai</button>
            <button onclick="switchTab('berita')" id="nav-berita" class="w-full text-left p-4 text-slate-400 hover:bg-slate-800 rounded-xl font-bold transition"><i class="fas fa-newspaper mr-3"></i>Berita</button>
            <button onclick="switchTab('karya')" id="nav-karya" class="w-full text-left p-4 text-slate-400 hover:bg-slate-800 rounded-xl font-bold transition"><i class="fas fa-lightbulb mr-3"></i>Karya Guru</button>
            <button onclick="switchTab('kelas')" id="nav-kelas" class="w-full text-left p-4 text-slate-400 hover:bg-slate-800 rounded-xl font-bold transition"><i class="fas fa-school mr-3"></i>Kelas</button>
        </nav>
        <a href="index.html" class="p-4 text-red-400 font-bold hover:bg-red-500/10 rounded-xl transition"><i class="fas fa-sign-out-alt mr-3"></i>Keluar</a>
    </aside>

    <main class="flex-1 p-10 max-w-6xl">
        <div id="tab-berita" class="hidden">
            <div class="bg-white p-8 rounded-3xl shadow-xl mb-10 border-t-8 border-red-500">
                <h2 class="text-xl font-black mb-6 uppercase text-red-600">Publikasi Berita Sekolah</h2>
                <form id="formBerita" class="grid grid-cols-2 gap-4">
                    <input type="text" id="b_judul" placeholder="Judul Berita" class="col-span-2 p-3 border-2 rounded-xl outline-none" required>
                    <input type="text" id="b_kategori" placeholder="Kategori (Misal: Kegiatan)" class="p-3 border-2 rounded-xl outline-none">
                    <input type="url" id="b_gambar" placeholder="URL Gambar" class="p-3 border-2 rounded-xl outline-none">
                    <textarea id="b_isi" placeholder="Tuliskan berita di sini..." class="col-span-2 p-3 border-2 rounded-xl h-32 outline-none" required></textarea>
                    <button type="button" onclick="simpanData('berita')" id="btnSimpanB" class="col-span-2 bg-red-600 text-white font-bold py-4 rounded-xl shadow-lg">TERBITKAN BERITA</button>
                </form>
            </div>
            <div class="bg-white p-8 rounded-3xl shadow-xl">
                <table class="w-full text-left border-collapse">
                    <thead><tr class="text-xs uppercase text-gray-400 border-b"><th class="pb-4">Judul Berita</th><th class="pb-4 text-right">Aksi</th></tr></thead>
                    <tbody id="listBerita" class="divide-y"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-pegawai" class="block">
            <div class="bg-white p-8 rounded-3xl shadow-xl mb-10 border-t-8 border-blue-600">
                <h2 class="text-xl font-black mb-6 uppercase text-blue-600">Data Pegawai</h2>
                <form id="formPegawai" class="grid grid-cols-2 gap-4">
                    <input type="hidden" id="p_id">
                    <input type="text" id="p_nama" placeholder="Nama Lengkap" class="p-3 border-2 rounded-xl outline-none" required>
                    <input type="text" id="p_nuptk" placeholder="NUPTK" class="p-3 border-2 rounded-xl outline-none">
                    <select id="p_kategori" class="p-3 border-2 rounded-xl outline-none">
                        <option value="guru_putra">Guru Putra</option>
                        <option value="guru_putri">Guru Putri</option>
                        <option value="tendik">Tendik</option>
                    </select>
                    <input type="text" id="p_jabatan" placeholder="Jabatan" class="p-3 border-2 rounded-xl outline-none">
                    <input type="text" id="p_foto" placeholder="URL Foto" class="col-span-2 p-3 border-2 rounded-xl outline-none">
                    <button type="button" onclick="simpanData('pegawai')" id="btnSimpanP" class="col-span-2 bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg">SIMPAN PEGAWAI</button>
                </form>
            </div>
            <div class="bg-white p-8 rounded-3xl shadow-xl">
                <table class="w-full text-left border-collapse">
                    <thead><tr class="text-xs uppercase text-gray-400 border-b"><th class="pb-4">Nama Pegawai</th><th class="pb-4 text-right">Aksi</th></tr></thead>
                    <tbody id="listPegawai" class="divide-y"></tbody>
                </table>
            </div>
        </div>

        </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwWPntN4_oJssDtiuUtC7ipHYDjCeqdrEeYHuCfUXQ03Vl5OmJQ3JdZJP9e_zyMx1dy/exec";

        function switchTab(tab) {
            ['pegawai', 'berita', 'karya', 'kelas'].forEach(t => {
                const el = document.getElementById(`tab-${t}`);
                if (el) el.style.display = t === tab ? 'block' : 'none';
                const btn = document.getElementById(`nav-${t}`);
                if (btn) btn.className = `w-full text-left p-4 rounded-xl font-bold transition ${t === tab ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-slate-800'}`;
            });
        }

        async function fetchAll() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                // Render List Pegawai dengan Tombol Edit & Hapus
                document.getElementById('listPegawai').innerHTML = data.pegawai.map(p => `
                    <tr>
                        <td class="py-4 font-bold">${p.nama}</td>
                        <td class="py-4 text-right space-x-2">
                            <button onclick="siapkanEditPegawai(${p.id})" class="text-blue-500 hover:bg-blue-50 px-3 py-1 rounded-lg">Edit</button>
                            <button onclick="hapusData('pegawai', ${p.id})" class="text-red-500 hover:bg-red-50 px-3 py-1 rounded-lg">Hapus</button>
                        </td>
                    </tr>
                `).join('');

                // Render List Berita
                document.getElementById('listBerita').innerHTML = data.berita.map(b => `
                    <tr>
                        <td class="py-4 font-bold">${b.judul}</td>
                        <td class="py-4 text-right">
                            <button onclick="hapusData('berita', ${b.id})" class="text-red-500 hover:bg-red-50 px-3 py-1 rounded-lg">Hapus</button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) { console.error(e); }
        }

        async function simpanData(tipe) {
            let data = { tipe_data: tipe, action: "add" };
            if (tipe === 'berita') {
                data = { ...data, tanggal: new Date().toISOString(), judul: document.getElementById('b_judul').value, kategori: document.getElementById('b_kategori').value, gambar: document.getElementById('b_gambar').value, isi: document.getElementById('b_isi').value };
            } else if (tipe === 'pegawai') {
                const id = document.getElementById('p_id').value;
                data = { ...data, action: id ? "edit" : "add", id: id, nama: document.getElementById('p_nama').value, nuptk: document.getElementById('p_nuptk').value, kategori: document.getElementById('p_kategori').value, jabatan: document.getElementById('p_jabatan').value, foto: document.getElementById('p_foto').value };
            }

            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                alert("Berhasil!");
                location.reload();
            } catch (e) { alert("Gagal!"); }
        }

        async function hapusData(tipe, id) {
            if (!confirm("Hapus data ini?")) return;
            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ tipe_data: tipe, action: "hapus", id: id }) });
                location.reload();
            } catch (e) { alert("Gagal!"); }
        }

        function siapkanEditPegawai(id) {
            // Logika untuk mengisi form dengan data lama bisa ditambahkan di sini
            alert("Fitur edit sedang sinkronisasi data...");
        }

        document.addEventListener('DOMContentLoaded', fetchAll);
    </script>
</body>
</html>
