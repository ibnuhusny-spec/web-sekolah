<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>CMS SDIT Qurratu A'yun</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex min-h-screen font-sans">

    <aside class="w-64 bg-slate-900 text-white p-6 sticky top-0 h-screen flex flex-col shadow-2xl">
        <div class="mb-10 text-center font-black text-blue-400 uppercase tracking-widest border-b border-slate-700 pb-4">
            Panel Kontrol
        </div>
        <nav class="space-y-2 flex-1">
            <button onclick="switchTab('pegawai')" id="nav-pegawai" class="w-full text-left p-4 bg-blue-600 rounded-xl font-bold transition"><i class="fas fa-users mr-3"></i>Pegawai</button>
            <button onclick="switchTab('berita')" id="nav-berita" class="w-full text-left p-4 text-slate-400 hover:bg-slate-800 rounded-xl font-bold transition"><i class="fas fa-newspaper mr-3"></i>Berita</button>
            <button onclick="switchTab('karya')" id="nav-karya" class="w-full text-left p-4 text-slate-400 hover:bg-slate-800 rounded-xl font-bold transition"><i class="fas fa-lightbulb mr-3"></i>Karya Guru</button>
            <button onclick="switchTab('kelas')" id="nav-kelas" class="w-full text-left p-4 text-slate-400 hover:bg-slate-800 rounded-xl font-bold transition"><i class="fas fa-school mr-3"></i>Kelas</button>
        </nav>
        <a href="index.html" class="p-4 text-red-400 font-bold hover:bg-red-500/10 rounded-xl transition text-center"><i class="fas fa-sign-out-alt mr-3"></i>Kembali ke Web</a>
    </aside>

    <main class="flex-1 p-10 max-w-6xl mx-auto">
        
        <div id="tab-pegawai" class="block">
            <div class="bg-white p-8 rounded-3xl shadow-xl mb-10 border-t-8 border-blue-600">
                <h2 class="text-xl font-black mb-6 uppercase text-blue-600"><i class="fas fa-user-plus mr-2"></i>Input Pegawai Baru</h2>
                <form id="formPegawai" class="grid grid-cols-2 gap-4">
                    <input type="text" id="p_nama" placeholder="Nama Lengkap" class="p-3 border-2 rounded-xl outline-none focus:border-blue-500" required>
                    <input type="text" id="p_nuptk" placeholder="NUPTK (Opsional)" class="p-3 border-2 rounded-xl outline-none focus:border-blue-500">
                    <select id="p_kategori" class="p-3 border-2 rounded-xl outline-none focus:border-blue-500">
                        <option value="guru_putra">Guru Putra</option>
                        <option value="guru_putri">Guru Putri</option>
                        <option value="tendik">Tendik</option>
                    </select>
                    <input type="text" id="p_jabatan" placeholder="Jabatan" class="p-3 border-2 rounded-xl outline-none focus:border-blue-500">
                    <input type="text" id="p_tempat" placeholder="Tempat Lahir" class="p-3 border-2 rounded-xl outline-none focus:border-blue-500">
                    <input type="date" id="p_tgl_lahir" class="p-3 border-2 rounded-xl outline-none text-gray-500 focus:border-blue-500">
                    <input type="text" id="p_pendidikan" placeholder="Pendidikan" class="p-3 border-2 rounded-xl outline-none focus:border-blue-500">
                    <input type="date" id="p_tgl_masuk" class="p-3 border-2 rounded-xl outline-none text-gray-500 focus:border-blue-500">
                    <input type="email" id="p_email" placeholder="Email (Opsional)" class="p-3 border-2 rounded-xl outline-none focus:border-blue-500">
                    <input type="url" id="p_foto" placeholder="URL Foto ImgBB" class="p-3 border-2 rounded-xl outline-none focus:border-blue-500">
                    <button type="button" onclick="simpanData('pegawai')" id="btnSimpanPegawai" class="col-span-2 bg-blue-600 text-white font-black py-4 rounded-xl shadow-lg hover:bg-blue-700 transition">SIMPAN PEGAWAI</button>
                </form>
            </div>
            <div class="bg-white p-8 rounded-3xl shadow-xl">
                <h2 class="text-lg font-bold mb-4 text-gray-700">Daftar Pegawai</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm"><tbody id="listPegawai" class="divide-y"><tr><td class="py-4">Loading...</td></tr></tbody></table>
                </div>
            </div>
        </div>

        <div id="tab-berita" class="hidden">
            <div class="bg-white p-8 rounded-3xl shadow-xl mb-10 border-t-8 border-red-600">
                <h2 class="text-xl font-black mb-6 uppercase text-red-600"><i class="fas fa-bullhorn mr-2"></i>Terbitkan Berita</h2>
                <form id="formBerita" class="grid grid-cols-2 gap-4">
                    <input type="text" id="b_judul" placeholder="Judul Berita" class="col-span-2 p-3 border-2 rounded-xl outline-none focus:border-red-500" required>
                    <input type="text" id="b_kategori" placeholder="Kategori (Misal: Kegiatan)" class="p-3 border-2 rounded-xl outline-none focus:border-red-500">
                    <input type="url" id="b_gambar" placeholder="URL Gambar (Opsional)" class="p-3 border-2 rounded-xl outline-none focus:border-red-500">
                    <textarea id="b_isi" placeholder="Tuliskan isi berita di sini..." class="col-span-2 p-4 border-2 rounded-xl h-32 outline-none focus:border-red-500" required></textarea>
                    <button type="button" onclick="simpanData('berita')" id="btnSimpanBerita" class="col-span-2 bg-red-600 text-white font-black py-4 rounded-xl shadow-lg hover:bg-red-700 transition">TERBITKAN BERITA</button>
                </form>
            </div>
            <div class="bg-white p-8 rounded-3xl shadow-xl">
                <h2 class="text-lg font-bold mb-4 text-gray-700">Riwayat Berita</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm"><tbody id="listBerita" class="divide-y"><tr><td class="py-4">Loading...</td></tr></tbody></table>
                </div>
            </div>
        </div>

        <div id="tab-karya" class="hidden">
            <div class="bg-white p-8 rounded-3xl shadow-xl mb-10 border-t-8 border-orange-500">
                <h2 class="text-xl font-black mb-6 uppercase text-orange-500"><i class="fas fa-lightbulb mr-2"></i>Publikasi Karya</h2>
                <form id="formKarya" class="grid grid-cols-2 gap-4">
                    <input type="text" id="k_judul" placeholder="Judul Karya / Artikel" class="col-span-2 p-3 border-2 rounded-xl outline-none focus:border-orange-500" required>
                    <input type="text" id="k_penulis" placeholder="Nama Penulis" class="p-3 border-2 rounded-xl outline-none focus:border-orange-500" required>
                    <select id="k_kategori" class="p-3 border-2 rounded-xl outline-none focus:border-orange-500">
                        <option value="Artikel">Artikel</option>
                        <option value="Desain">Desain</option>
                        <option value="Aplikasi">Aplikasi</option>
                    </select>
                    <input type="url" id="k_gambar" placeholder="URL Gambar (Kosongkan jika teks saja)" class="col-span-2 p-3 border-2 rounded-xl outline-none focus:border-orange-500">
                    <textarea id="k_deskripsi" placeholder="Tuliskan isi artikel atau deskripsi karya..." class="col-span-2 p-4 border-2 rounded-xl outline-none focus:border-orange-500 h-32" required></textarea>
                    <button type="button" onclick="simpanData('karya')" id="btnSimpanKarya" class="col-span-2 bg-orange-500 text-white font-black py-4 rounded-xl shadow-lg hover:bg-orange-600 transition">PUBLIKASIKAN KARYA</button>
                </form>
            </div>
            <div class="bg-white p-8 rounded-3xl shadow-xl">
                <h2 class="text-lg font-bold mb-4 text-gray-700">Riwayat Karya</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm"><tbody id="listKarya" class="divide-y"><tr><td class="py-4">Loading...</td></tr></tbody></table>
                </div>
            </div>
        </div>

        <div id="tab-kelas" class="hidden">
            <div class="bg-white p-8 rounded-3xl shadow-xl mb-10 border-t-8 border-purple-500">
                <h2 class="text-xl font-black mb-6 uppercase text-purple-600"><i class="fas fa-school mr-2"></i>Tambah / Update Kelas</h2>
                <form id="formKelas" class="grid grid-cols-2 gap-4">
                    <input type="text" id="c_nama" placeholder="Nama Kelas (Contoh: Kelas 1)" class="col-span-2 p-3 border-2 rounded-xl outline-none focus:border-purple-500" required>
                    <input type="number" id="c_laki" placeholder="Jumlah Laki-laki" class="p-3 border-2 rounded-xl outline-none focus:border-purple-500" required>
                    <input type="number" id="c_perempuan" placeholder="Jumlah Perempuan" class="p-3 border-2 rounded-xl outline-none focus:border-purple-500" required>
                    <button type="button" onclick="simpanData('kelas')" id="btnSimpanKelas" class="col-span-2 bg-purple-600 text-white font-black py-4 rounded-xl shadow-lg hover:bg-purple-700 transition">SIMPAN DATA KELAS</button>
                </form>
            </div>
            <div class="bg-white p-8 rounded-3xl shadow-xl">
                <h2 class="text-lg font-bold mb-4 text-gray-700">Daftar Kelas</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm"><tbody id="listKelas" class="divide-y"><tr><td class="py-4">Loading...</td></tr></tbody></table>
                </div>
            </div>
        </div>

    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwWPntN4_oJssDtiuUtC7ipHYDjCeqdrEeYHuCfUXQ03Vl5OmJQ3JdZJP9e_zyMx1dy/exec"; // JANGAN LUPA GANTI INI

        // Sistem Navigasi Tab
        function switchTab(tab) {
            ['pegawai', 'berita', 'karya', 'kelas'].forEach(t => {
                document.getElementById(`tab-${t}`).style.display = t === tab ? 'block' : 'none';
                const btn = document.getElementById(`nav-${t}`);
                if(t === tab) {
                    const colors = {pegawai: 'bg-blue-600', berita: 'bg-red-600', karya: 'bg-orange-500', kelas: 'bg-purple-600'};
                    btn.className = `w-full text-left p-4 ${colors[t]} text-white rounded-xl font-bold transition shadow-lg`;
                } else {
                    btn.className = "w-full text-left p-4 text-slate-400 hover:bg-slate-800 rounded-xl font-bold transition";
                }
            });
        }

        // FUNGSI UTAMA: MENARIK DAN MENGGAMBAR SEMUA DATA KE TABEL CMS
        async function fetchAll() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                // Menggambar Tabel Pegawai
                const tPegawai = document.getElementById('listPegawai');
                if(data.pegawai && data.pegawai.length > 0) {
                    tPegawai.innerHTML = data.pegawai.map(p => `<tr><td class="py-4 font-bold">${p.nama}</td><td class="py-4 text-gray-500">${p.jabatan}</td><td class="py-4 text-right"><button onclick="hapusData('pegawai', ${p.id})" class="text-red-500 hover:bg-red-50 px-3 py-1 rounded-lg font-bold"><i class="fas fa-trash mr-1"></i>Hapus</button></td></tr>`).join('');
                } else { tPegawai.innerHTML = `<tr><td class="py-4 text-gray-400 italic">Belum ada data.</td></tr>`; }

                // Menggambar Tabel Berita
                const tBerita = document.getElementById('listBerita');
                if(data.berita && data.berita.length > 0) {
                    tBerita.innerHTML = data.berita.map(b => `<tr><td class="py-4 font-bold">${b.judul}</td><td class="py-4 text-xs uppercase text-red-500 font-bold">${b.kategori}</td><td class="py-4 text-right"><button onclick="hapusData('berita', ${b.id})" class="text-red-500 hover:bg-red-50 px-3 py-1 rounded-lg font-bold"><i class="fas fa-trash mr-1"></i>Hapus</button></td></tr>`).join('');
                } else { tBerita.innerHTML = `<tr><td class="py-4 text-gray-400 italic">Belum ada berita.</td></tr>`; }

                // Menggambar Tabel Karya
                const tKarya = document.getElementById('listKarya');
                if(data.karya && data.karya.length > 0) {
                    tKarya.innerHTML = data.karya.map(k => `<tr><td class="py-4 font-bold">${k.judul}</td><td class="py-4 text-gray-500">Oleh: ${k.penulis}</td><td class="py-4 text-right"><button onclick="hapusData('karya', ${k.id})" class="text-red-500 hover:bg-red-50 px-3 py-1 rounded-lg font-bold"><i class="fas fa-trash mr-1"></i>Hapus</button></td></tr>`).join('');
                } else { tKarya.innerHTML = `<tr><td class="py-4 text-gray-400 italic">Belum ada karya.</td></tr>`; }

                // Menggambar Tabel Kelas
                const tKelas = document.getElementById('listKelas');
                if(data.kelas && data.kelas.length > 0) {
                    tKelas.innerHTML = data.kelas.map(c => `<tr><td class="py-4 font-bold">${c.nama_kelas}</td><td class="py-4 text-gray-600">L: ${c.laki} | P: ${c.perempuan}</td><td class="py-4 font-black text-purple-600">Total: ${parseInt(c.laki)+parseInt(c.perempuan)}</td><td class="py-4 text-right"><button onclick="hapusData('kelas', ${c.id})" class="text-red-500 hover:bg-red-50 px-3 py-1 rounded-lg font-bold"><i class="fas fa-trash mr-1"></i>Hapus</button></td></tr>`).join('');
                } else { tKelas.innerHTML = `<tr><td class="py-4 text-gray-400 italic">Belum ada data kelas.</td></tr>`; }

            } catch (e) { console.error(e); }
        }

        // FUNGSI MENYIMPAN DATA (Otomatis Mendeteksi Tab yang Sedang Aktif)
        async function simpanData(tipe) {
            let data = { tipe_data: tipe, action: "add" };
            let btn, formId;

            if (tipe === 'berita') {
                btn = document.getElementById('btnSimpanBerita'); formId = 'formBerita';
                data = { ...data, tanggal: new Date().toISOString().split('T')[0], judul: document.getElementById('b_judul').value, kategori: document.getElementById('b_kategori').value, gambar: document.getElementById('b_gambar').value || "-", isi: document.getElementById('b_isi').value };
                if(!data.judul) return alert("Judul berita wajib diisi!");
            } 
            else if (tipe === 'pegawai') {
                btn = document.getElementById('btnSimpanPegawai'); formId = 'formPegawai';
                data = { ...data, nama: document.getElementById('p_nama').value, nuptk: document.getElementById('p_nuptk').value || "-", kategori: document.getElementById('p_kategori').value, jabatan: document.getElementById('p_jabatan').value || "-", tempatLahir: document.getElementById('p_tempat').value || "-", tanggalLahir: document.getElementById('p_tgl_lahir').value || "-", pendidikan: document.getElementById('p_pendidikan').value || "-", tanggalBergabung: document.getElementById('p_tgl_masuk').value || "-", email: document.getElementById('p_email').value || "-", foto: document.getElementById('p_foto').value || "https://i.ibb.co/Xz9Gf4z/default.png" };
                if(!data.nama) return alert("Nama pegawai wajib diisi!");
            } 
            else if (tipe === 'karya') {
                btn = document.getElementById('btnSimpanKarya'); formId = 'formKarya';
                data = { ...data, tanggal: new Date().toISOString().split('T')[0], penulis: document.getElementById('k_penulis').value, kategori: document.getElementById('k_kategori').value, judul: document.getElementById('k_judul').value, gambar: document.getElementById('k_gambar').value || "-", deskripsi: document.getElementById('k_deskripsi').value };
                if(!data.judul) return alert("Judul karya wajib diisi!");
            } 
            else if (tipe === 'kelas') {
                btn = document.getElementById('btnSimpanKelas'); formId = 'formKelas';
                data = { ...data, nama_kelas: document.getElementById('c_nama').value, laki: document.getElementById('c_laki').value, perempuan: document.getElementById('c_perempuan').value };
                if(!data.nama_kelas) return alert("Nama kelas wajib diisi!");
            }

            const oriText = btn.innerHTML;
            btn.innerHTML = "<i class='fas fa-spinner fa-spin mr-2'></i>MEMPROSES..."; 
            btn.disabled = true;

            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                alert("Alhamdulillah, data berhasil disimpan!");
                document.getElementById(formId).reset();
                fetchAll(); // Segarkan tabel secara otomatis tanpa reload halaman
            } catch (e) { 
                alert("Terjadi kesalahan saat menyimpan data."); 
            } finally { 
                btn.innerHTML = oriText; 
                btn.disabled = false; 
            }
        }

        // FUNGSI MENGHAPUS DATA
        async function hapusData(tipe, id) {
            if (!confirm("Apakah Anda yakin ingin menghapus data ini?")) return;
            try {
                alert("Sedang menghapus...");
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ tipe_data: tipe, action: "hapus", id: id }) });
                alert("Data berhasil dihapus!");
                fetchAll(); // Segarkan tabel secara otomatis
            } catch (e) { alert("Gagal menghapus data!"); }
        }

        // Panggil fungsi penarik data saat halaman pertama kali dibuka
        document.addEventListener('DOMContentLoaded', fetchAll);
    </script>
</body>
</html>
