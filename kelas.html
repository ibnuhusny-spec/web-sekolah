<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Kelas - SDIT Qurratu A'yun</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .menu-3d { transition: transform 0.3s, box-shadow 0.3s; }
        .menu-3d:hover { transform: perspective(500px) translateZ(20px) translateY(-5px); box-shadow: -10px 15px 25px rgba(0,0,0,0.2); }
        /* Animasi Teks Berjalan */
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-marquee { display: inline-block; animation: marquee 25s linear infinite; }
        .animate-marquee:hover { animation-play-state: paused; }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-50 to-slate-100 text-gray-800 font-sans flex flex-col min-h-screen pb-20">

    <nav class="fixed bottom-4 left-1/2 transform -translate-x-1/2 md:-translate-x-0 md:left-4 md:top-1/2 md:-translate-y-1/2 z-50 flex flex-row md:flex-col gap-2 md:gap-3 bg-slate-900/90 md:bg-transparent backdrop-blur-xl px-4 py-3 md:p-0 rounded-full md:rounded-none shadow-2xl md:shadow-none w-[95%] md:w-auto justify-between md:justify-start overflow-x-auto md:overflow-visible">
        <a href="index.html" class="menu-3d flex items-center justify-center w-12 h-12 md:w-14 md:h-14 bg-white/90 rounded-2xl shadow-lg border"><i class="fas fa-home text-blue-600 text-lg md:text-xl"></i></a>
        <a href="profil.html" class="menu-3d flex items-center justify-center w-12 h-12 md:w-14 md:h-14 bg-white/90 rounded-2xl shadow-lg border"><i class="fas fa-flag text-yellow-500 text-lg md:text-xl"></i></a>
        <a href="pegawai.html" class="menu-3d flex items-center justify-center w-12 h-12 md:w-14 md:h-14 bg-white/90 rounded-2xl shadow-lg border"><i class="fas fa-users text-green-500 text-lg md:text-xl"></i></a>
        <a href="kelas.html" class="menu-3d flex items-center justify-center w-12 h-12 md:w-14 md:h-14 bg-purple-500 rounded-2xl shadow-lg border-purple-400"><i class="fas fa-chalkboard-teacher text-white text-lg md:text-xl"></i></a>
        <a href="ppdb.html" class="menu-3d flex items-center justify-center w-12 h-12 md:w-14 md:h-14 bg-white/90 rounded-2xl shadow-lg border"><i class="fas fa-user-graduate text-emerald-500 text-lg md:text-xl"></i></a>
        <a href="karya.html" class="menu-3d flex items-center justify-center w-12 h-12 md:w-14 md:h-14 bg-white/90 rounded-2xl shadow-lg border"><i class="fas fa-lightbulb text-orange-500 text-lg md:text-xl"></i></a>
        <a href="berita.html" class="menu-3d flex items-center justify-center w-12 h-12 md:w-14 md:h-14 bg-white/90 rounded-2xl shadow-lg border"><i class="fas fa-newspaper text-red-500 text-lg md:text-xl"></i></a>
        <a href="redaksi.html" class="menu-3d flex items-center justify-center w-12 h-12 md:w-14 md:h-14 bg-white/90 rounded-2xl shadow-lg border"><i class="fas fa-id-badge text-indigo-600 text-lg md:text-xl"></i></a>
    </nav>

    <header class="bg-white shadow-sm p-4 md:pl-24 relative z-40 flex flex-col md:flex-row justify-center md:justify-start items-center">
        <div class="flex items-center gap-4"><img src="logo.png" class="h-12 w-auto" onerror="this.style.display='none'"><h1 class="text-xl md:text-2xl font-black text-blue-800 uppercase tracking-tight">SDIT Qurratu A'yun Al-Islami</h1></div>
    </header>

    <div class="bg-yellow-400 overflow-hidden py-2 shadow-inner relative z-30">
        <div class="flex whitespace-nowrap animate-marquee" id="tickerContent"><span class="mx-4 font-bold text-blue-900 italic"><i class="fas fa-spinner fa-spin mr-2"></i> Memuat kabar terbaru...</span></div>
    </div>

    <main class="flex-1 p-4 md:p-10 md:ml-16 max-w-5xl mx-auto w-full mt-4">
        <h2 class="text-3xl md:text-4xl font-black mb-2 text-gray-800 border-l-8 border-purple-600 pl-4">Data Keadaan Siswa</h2>
        <p class="text-gray-500 mb-8 md:ml-6">Akumulasi dan rincian jumlah siswa per kelas.</p>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10 md:ml-6">
            <div class="bg-blue-500 p-6 rounded-3xl shadow-lg text-white relative overflow-hidden">
                <i class="fas fa-male absolute -right-4 -bottom-4 text-7xl opacity-20"></i>
                <p class="text-xs font-bold uppercase tracking-widest opacity-80 mb-1">Total Laki-laki</p>
                <h3 class="text-4xl font-black" id="tot_laki">0</h3>
            </div>
            <div class="bg-pink-500 p-6 rounded-3xl shadow-lg text-white relative overflow-hidden">
                <i class="fas fa-female absolute -right-4 -bottom-4 text-7xl opacity-20"></i>
                <p class="text-xs font-bold uppercase tracking-widest opacity-80 mb-1">Total Perempuan</p>
                <h3 class="text-4xl font-black" id="tot_perempuan">0</h3>
            </div>
            <div class="bg-purple-600 p-6 rounded-3xl shadow-lg text-white relative overflow-hidden">
                <i class="fas fa-users absolute -right-4 -bottom-4 text-7xl opacity-20"></i>
                <p class="text-xs font-bold uppercase tracking-widest opacity-80 mb-1">Total Seluruh Siswa</p>
                <h3 class="text-4xl font-black" id="tot_semua">0</h3>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden md:ml-6">
            <div class="overflow-x-auto">
                <table class="w-full text-left min-w-[600px]">
                    <thead>
                        <tr class="bg-purple-50 text-purple-800 uppercase text-[10px] md:text-xs tracking-widest border-b-2 border-purple-100">
                            <th class="p-4 md:p-5 font-black w-16 text-center">No</th>
                            <th class="p-4 md:p-5 font-black">Nama Kelas</th>
                            <th class="p-4 md:p-5 font-black text-center text-blue-600"><i class="fas fa-male mr-1"></i> Laki-laki</th>
                            <th class="p-4 md:p-5 font-black text-center text-pink-600"><i class="fas fa-female mr-1"></i> Perempuan</th>
                            <th class="p-4 md:p-5 font-black text-center bg-purple-100 rounded-tr-3xl">Total</th>
                        </tr>
                    </thead>
                    <tbody id="kelas_tbody" class="divide-y divide-gray-50 text-sm md:text-base">
                        <tr>
                            <td colspan="5" class="p-8 text-center text-gray-400 italic">
                                <i class="fas fa-spinner fa-spin mr-2"></i> Mengambil data kelas...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAMTI0R0xGEWFSOAhzDZdJxnuX8hixBP7M", authDomain: "websekolah-9bcde.firebaseapp.com", projectId: "websekolah-9bcde", storageBucket: "websekolah-9bcde.firebasestorage.app", messagingSenderId: "113406929634", appId: "1:113406929634:web:df2b9dc1a45fecf0bc0cbb" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadKelas() {
            try {
                // Mengambil Data Kelas, Berita, & Karya Sekaligus
                const [snap, beritaSnap, karyaSnap] = await Promise.all([
                    getDocs(collection(db, "kelas")),
                    getDocs(collection(db, "berita")),
                    getDocs(collection(db, "karya"))
                ]);

                // Membangun Teks Berjalan
                const ticker = document.getElementById('tickerContent');
                let berita = beritaSnap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => b.tanggal.localeCompare(a.tanggal));
                let karya = karyaSnap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => b.tanggal.localeCompare(a.tanggal));
                
                let items = [...berita.slice(0,3), ...karya.slice(0,3)];
                if(items.length > 0) {
                    let content = items.map(item => `<a href="baca.html?id=${item.id}&type=${item.penulis ? 'karya' : 'berita'}" class="mx-10 text-blue-900 font-bold hover:text-red-600 transition tracking-tight uppercase italic text-xs"><i class="fas ${item.penulis ? 'fa-lightbulb text-orange-600' : 'fa-fire text-red-600'}"></i> ${item.judul} </a>`).join('');
                    ticker.innerHTML = content + content;
                } else {
                    ticker.innerHTML = '<span class="mx-4 font-bold text-blue-900 italic">Belum ada kabar terbaru...</span>';
                }

                // Mengolah Data Kelas
                const tbody = document.getElementById('kelas_tbody');
                let sumLaki = 0;
                let sumPerempuan = 0;

                let dataKelas = snap.docs.map(doc => doc.data());

                dataKelas.sort((a, b) => {
                    const namaA = (a.nama_kelas || "").toString().toLowerCase();
                    const namaB = (b.nama_kelas || "").toString().toLowerCase();
                    return namaA.localeCompare(namaB, undefined, { numeric: true, sensitivity: 'base' });
                });

                const htmlContent = dataKelas.map((d, index) => {
                    const laki = parseInt(d.laki) || 0;
                    const perempuan = parseInt(d.perempuan) || 0;
                    const totalSiswa = laki + perempuan;
                    
                    sumLaki += laki;
                    sumPerempuan += perempuan;

                    return `
                    <tr class="hover:bg-purple-50/30 transition duration-150">
                        <td class="p-4 md:p-5 text-center text-gray-400 font-bold">${index + 1}</td>
                        <td class="p-4 md:p-5 font-black text-gray-800 uppercase">${d.nama_kelas}</td>
                        <td class="p-4 md:p-5 text-center font-bold text-gray-600">${laki}</td>
                        <td class="p-4 md:p-5 text-center font-bold text-gray-600">${perempuan}</td>
                        <td class="p-4 md:p-5 text-center font-black text-purple-700 bg-purple-50/50">${totalSiswa}</td>
                    </tr>`;
                }).join('');

                if(dataKelas.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-gray-400 italic">Belum ada data kelas.</td></tr>`;
                } else {
                    tbody.innerHTML = htmlContent;
                    
                    document.getElementById('tot_laki').innerText = sumLaki;
                    document.getElementById('tot_perempuan').innerText = sumPerempuan;
                    document.getElementById('tot_semua').innerText = sumLaki + sumPerempuan;
                }
            } catch (e) { 
                console.error(e);
                document.getElementById('kelas_tbody').innerHTML = `<tr><td colspan="5" class="p-8 text-center text-red-500">Gagal memuat data kelas.</td></tr>`;
            }
        }
        loadKelas();
    </script>
</body>
</html>
