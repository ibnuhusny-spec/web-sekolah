<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Kelas - SDIT Qurratu A'yun</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 font-sans pb-20">

    <nav class="fixed bottom-4 left-1/2 transform -translate-x-1/2 z-50 flex gap-2 bg-slate-900/90 backdrop-blur-xl px-4 py-3 rounded-full shadow-2xl">
        <a href="index.html" class="w-10 h-10 bg-white flex items-center justify-center rounded-xl shadow"><i class="fas fa-home text-blue-600"></i></a>
        <a href="profil.html" class="w-10 h-10 bg-white flex items-center justify-center rounded-xl shadow"><i class="fas fa-flag text-yellow-500"></i></a>
        <a href="pegawai.html" class="w-10 h-10 bg-white flex items-center justify-center rounded-xl shadow"><i class="fas fa-users text-green-600"></i></a>
        <a href="kelas.html" class="w-10 h-10 bg-purple-600 flex items-center justify-center rounded-xl shadow text-white"><i class="fas fa-school"></i></a>
    </nav>

    <header class="bg-white shadow-sm p-4 flex items-center gap-4">
        <img src="logo.png" class="h-10 w-auto" onerror="this.style.display='none'">
        <h1 class="text-xl font-black text-blue-800 uppercase italic">SDIT Qurratu A'yun Al-Islami</h1>
    </header>

    <main class="max-w-5xl mx-auto p-6 mt-6">
        <h2 class="text-3xl font-black text-gray-800 mb-8 border-l-8 border-purple-600 pl-4 uppercase italic">Data Keadaan Siswa</h2>
        
        <div id="kelas_grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="text-gray-400 italic col-span-full text-center py-10"><i class="fas fa-spinner fa-spin mr-2"></i> Mengambil data kelas...</div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAMTI0R0xGEWFSOAhzDZdJxnuX8hixBP7M", authDomain: "websekolah-9bcde.firebaseapp.com", projectId: "websekolah-9bcde", storageBucket: "websekolah-9bcde.firebasestorage.app", messagingSenderId: "113406929634", appId: "1:113406929634:web:df2b9dc1a45fecf0bc0cbb" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadKelas() {
            try {
                const snap = await getDocs(collection(db, "kelas"));
                const grid = document.getElementById('kelas_grid');
                grid.innerHTML = snap.docs.map(doc => {
                    const d = doc.data();
                    const total = (parseInt(d.laki) || 0) + (parseInt(d.perempuan) || 0);
                    return `
                    <div class="bg-white p-6 rounded-[2rem] shadow-lg border border-gray-100 transition hover:shadow-xl hover:-translate-y-1">
                        <div class="flex justify-between items-start mb-6">
                            <h3 class="text-xl font-black text-purple-700 uppercase italic">${d.nama_kelas}</h3>
                            <span class="bg-purple-100 text-purple-700 text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Siswa : ${total}</span>
                        </div>
                        
                        <div class="space-y-2 text-sm">
                            <div class="grid grid-cols-[100px_auto] items-center">
                                <span class="text-gray-400 font-bold uppercase text-[10px]">Laki-laki</span>
                                <span class="font-bold text-gray-700">: ${d.laki || 0} Siswa</span>
                            </div>
                            <div class="grid grid-cols-[100px_auto] items-center">
                                <span class="text-gray-400 font-bold uppercase text-[10px]">Perempuan</span>
                                <span class="font-bold text-gray-700">: ${d.perempuan || 0} Siswa</span>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            } catch (e) { console.error(e); }
        }
        loadKelas();
    </script>
</body>
</html>
