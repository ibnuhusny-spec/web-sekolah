<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redaksi & Kontak - SDIT Qurratu A'yun</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 font-sans pb-20">

    <nav class="fixed bottom-4 left-1/2 transform -translate-x-1/2 z-50 flex gap-2 bg-slate-900/90 backdrop-blur-xl px-4 py-3 rounded-full shadow-2xl">
        <a href="index.html" class="w-10 h-10 bg-white flex items-center justify-center rounded-xl shadow"><i class="fas fa-home text-blue-600"></i></a>
        <a href="profil.html" class="w-10 h-10 bg-white flex items-center justify-center rounded-xl shadow"><i class="fas fa-flag text-yellow-500"></i></a>
        <a href="pegawai.html" class="w-10 h-10 bg-white flex items-center justify-center rounded-xl shadow"><i class="fas fa-users text-green-600"></i></a>
        <a href="redaksi.html" class="w-10 h-10 bg-indigo-600 flex items-center justify-center rounded-xl shadow text-white"><i class="fas fa-id-badge"></i></a>
    </nav>

    <header class="bg-white shadow-sm p-4 flex items-center gap-4">
        <img src="logo.png" class="h-10 w-auto" onerror="this.style.display='none'">
        <h1 class="text-xl font-black text-blue-800 uppercase italic">SDIT Qurratu A'yun Al-Islami</h1>
    </header>

    <main class="max-w-4xl mx-auto p-6 mt-6">
        <div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border-t-[12px] border-indigo-600">
            <div class="p-8 md:p-12">
                <h2 class="text-3xl font-black text-gray-800 mb-8 border-l-8 border-indigo-600 pl-4 uppercase italic">Hubungi Kami</h2>
                
                <div id="redaksi_loading" class="text-gray-400 italic py-10 text-center"><i class="fas fa-spinner fa-spin mr-2"></i> Memuat info kontak...</div>
                
                <div id="redaksi_content" class="hidden animate-fade-in space-y-12">
                    <div class="bg-indigo-50 p-8 rounded-3xl space-y-4 shadow-inner">
                        <div class="grid grid-cols-1 md:grid-cols-[140px_auto] gap-1 md:gap-0">
                            <span class="text-indigo-400 font-black uppercase text-xs">Alamat Kantor</span>
                            <span id="v_alamat" class="font-bold text-indigo-900">: </span>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-[140px_auto] gap-1 md:gap-0 border-t border-indigo-100 pt-4">
                            <span class="text-indigo-400 font-black uppercase text-xs">Email Resmi</span>
                            <span id="v_email" class="font-bold text-indigo-900">: </span>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-[140px_auto] gap-1 md:gap-0 border-t border-indigo-100 pt-4">
                            <span class="text-indigo-400 font-black uppercase text-xs">WhatsApp</span>
                            <span id="v_wa" class="font-bold text-indigo-900">: </span>
                        </div>
                    </div>

                    <div>
                        <h3 class="text-lg font-black text-indigo-600 mb-6 flex items-center gap-2 uppercase italic"><i class="fas fa-users-cog"></i> Susunan Redaksi Website</h3>
                        <div id="v_tim" class="text-gray-600 whitespace-pre-line leading-loose font-medium ml-4"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAMTI0R0xGEWFSOAhzDZdJxnuX8hixBP7M", authDomain: "websekolah-9bcde.firebaseapp.com", projectId: "websekolah-9bcde", storageBucket: "websekolah-9bcde.firebasestorage.app", messagingSenderId: "113406929634", appId: "1:113406929634:web:df2b9dc1a45fecf0bc0cbb" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadRedaksi() {
            try {
                const snap = await getDoc(doc(db, "profil", "redaksi"));
                if (snap.exists()) {
                    const d = snap.data();
                    document.getElementById('v_alamat').innerHTML = `: ${d.alamat || '-'}`;
                    document.getElementById('v_email').innerHTML = `: ${d.email || '-'}`;
                    document.getElementById('v_wa').innerHTML = `: ${d.whatsapp || '-'}`;
                    document.getElementById('v_tim').innerText = d.tim || "-";
                    document.getElementById('redaksi_loading').classList.add('hidden');
                    document.getElementById('redaksi_content').classList.remove('hidden');
                }
            } catch (e) { console.error(e); }
        }
        loadRedaksi();
    </script>
</body>
</html>
