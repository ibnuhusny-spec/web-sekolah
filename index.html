<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDIT Qurratu A'yun Al-Islami</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.5s ease forwards; }
        /* Scrollbar kustom agar tetap cantik */
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-blue-700 p-4 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a href="#home" class="flex items-center gap-3">
                <img src="logo.png" alt="Logo" class="h-10 w-auto bg-white rounded-full p-1">
                <h1 class="text-lg md:text-xl font-bold uppercase">SDIT Qurratu A'yun Al-Islami</h1>
            </a>
            <ul class="hidden md:flex space-x-6 font-medium">
                <li><a href="#home" class="hover:text-yellow-300 transition">Beranda</a></li>
                <li><a href="#profil" class="hover:text-yellow-300 transition">Profil</a></li>
                <li><a href="#pegawai" class="hover:text-yellow-300 transition">Guru & Pegawai</a></li>
            </ul>
        </div>
    </nav>

    <header id="home" class="bg-blue-600 py-28 text-center text-white relative overflow-hidden">
        <div class="container mx-auto px-4 relative z-10">
            <h2 class="text-4xl md:text-6xl font-black mb-6 drop-shadow-lg text-white">Selamat Datang di Portal Pendidikan Kami</h2>
            <p id="txtSlogan" class="text-xl md:text-3xl font-light opacity-90">Cerdas, Bertauhid, dan Berakhlak Mulia</p>
        </div>
    </header>

    <section id="profil" class="container mx-auto py-24 px-4">
        <div class="grid md:grid-cols-3 gap-8">
            <div class="bg-white p-8 rounded-3xl shadow-xl border-b-8 border-blue-600">
                <h3 class="text-2xl font-bold mb-4 text-blue-700">Visi</h3>
                <div id="txtVisi" class="text-gray-600 h-64 overflow-y-auto custom-scroll text-justify italic pr-2">Memuat...</div>
            </div>
            <div class="bg-white p-8 rounded-3xl shadow-xl border-b-8 border-yellow-500">
                <h3 class="text-2xl font-bold mb-4 text-yellow-600">Misi</h3>
                <div id="txtMisi" class="text-gray-600 h-64 overflow-y-auto custom-scroll pr-2 whitespace-pre-line">Memuat...</div>
            </div>
            <div class="bg-white p-8 rounded-3xl shadow-xl border-b-8 border-green-500">
                <h3 class="text-2xl font-bold mb-4 text-green-700">Tujuan</h3>
                <div id="txtTujuan" class="text-gray-600 h-64 overflow-y-auto custom-scroll pr-2 whitespace-pre-line">Memuat...</div>
            </div>
        </div>
    </section>

    <section id="pegawai" class="bg-gradient-to-br from-indigo-600 to-purple-800 py-24 px-4">
        <div class="container mx-auto max-w-6xl">
            <div class="flex flex-wrap justify-center gap-4 mb-12" id="filterContainer">
                <button class="filter-btn px-8 py-3 bg-white rounded-full font-bold shadow-lg" onclick="setKategori('semua', this)" id="btnSemua">Semua</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10" id="staffGrid"></div>
        </div>
    </section>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwWPntN4_oJssDtiuUtC7ipHYDjCeqdrEeYHuCfUXQ03Vl5OmJQ3JdZJP9e_zyMx1dy/exec"; 
        let staffData = [];

        // Fungsi Penata Tanggal agar tidak berantakan
        function formatIndoDate(dateStr) {
            if (!dateStr || dateStr === "-" || dateStr === "null") return "-";
            try {
                const date = new Date(dateStr);
                if (isNaN(date.getTime())) return dateStr; 
                return date.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
            } catch { return dateStr; }
        }

        async function fetchData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                document.getElementById('txtVisi').innerText = (data.profil.visi || "-").replace(/[\r\n]+/g, ' ');
                
                function formatList(teks) {
                    if (!teks || teks === "-") return "-";
                    let poin = teks.split(/[\r\n]+/).map(p => p.trim()).filter(p => p.length > 0);
                    return "<ul class='list-disc pl-5 space-y-2'>" + poin.map(p => `<li>${p}</li>`).join('') + "</ul>";
                }

                document.getElementById('txtMisi').innerHTML = formatList(data.profil.misi);
                document.getElementById('txtTujuan').innerHTML = formatList(data.profil.tujuan);
                document.getElementById('txtSlogan').innerText = data.profil.slogan || "Cerdas, Bertauhid, dan Berakhlak Mulia";
                
                staffData = data.pegawai;
                renderCards();
            } catch (err) { console.error(err); }
        }

        function renderCards() {
            const grid = document.getElementById('staffGrid');
            grid.innerHTML = "";
            staffData.forEach((s, i) => {
                grid.innerHTML += `
                    <div class="bg-white rounded-3xl overflow-hidden shadow-xl animate-fade" style="animation-delay: ${i*0.05}s">
                        <img src="${s.foto}" class="w-full h-72 object-cover">
                        <div class="p-8">
                            <h3 class="text-xl font-bold text-gray-800">${s.nama}</h3>
                            <p class="text-blue-600 font-bold text-sm mb-4 uppercase">${s.jabatan}</p>
                            <div class="bg-gray-50 p-4 rounded-2xl text-xs space-y-2">
                                <p><b>Pendidikan:</b> ${s.pendidikan}</p>
                                <p><b>Masuk:</b> ${formatIndoDate(s.tanggalBergabung)}</p>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        document.addEventListener('DOMContentLoaded', fetchData);
    </script>
</body>
</html>
