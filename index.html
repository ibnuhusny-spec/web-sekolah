<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beranda - SDIT Qurratu A'yun Al-Islami</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .menu-3d { transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s; }
        .menu-3d:hover { transform: perspective(500px) translateZ(20px) translateY(-5px) rotateX(5deg) rotateY(-5deg); box-shadow: -10px 15px 25px rgba(0,0,0,0.2); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <nav class="fixed left-4 top-1/2 transform -translate-y-1/2 z-50 flex flex-col gap-4">
        <a href="index.html" class="menu-3d group relative flex items-center justify-center w-14 h-14 bg-white/90 backdrop-blur-md rounded-2xl shadow-lg border border-white"><i class="fas fa-home text-blue-600 text-xl"></i><span class="absolute left-16 bg-gray-900 text-white text-xs font-bold px-4 py-2 rounded-xl opacity-0 group-hover:opacity-100 transition-all pointer-events-none whitespace-nowrap">Beranda</span></a>
        <a href="profil.html" class="menu-3d group relative flex items-center justify-center w-14 h-14 bg-white/90 backdrop-blur-md rounded-2xl shadow-lg border border-white"><i class="fas fa-flag text-yellow-500 text-xl"></i><span class="absolute left-16 bg-gray-900 text-white text-xs font-bold px-4 py-2 rounded-xl opacity-0 group-hover:opacity-100 transition-all pointer-events-none whitespace-nowrap">Profil</span></a>
        <a href="pegawai.html" class="menu-3d group relative flex items-center justify-center w-14 h-14 bg-white/90 backdrop-blur-md rounded-2xl shadow-lg border border-white"><i class="fas fa-users text-green-500 text-xl"></i><span class="absolute left-16 bg-gray-900 text-white text-xs font-bold px-4 py-2 rounded-xl opacity-0 group-hover:opacity-100 transition-all pointer-events-none whitespace-nowrap">Pegawai</span></a>
        <a href="kelas.html" class="menu-3d group relative flex items-center justify-center w-14 h-14 bg-white/90 backdrop-blur-md rounded-2xl shadow-lg border border-white"><i class="fas fa-chalkboard-teacher text-purple-500 text-xl"></i><span class="absolute left-16 bg-gray-900 text-white text-xs font-bold px-4 py-2 rounded-xl opacity-0 group-hover:opacity-100 transition-all pointer-events-none whitespace-nowrap">Kelas</span></a>
        <a href="karya.html" class="menu-3d group relative flex items-center justify-center w-14 h-14 bg-white/90 backdrop-blur-md rounded-2xl shadow-lg border border-white"><i class="fas fa-lightbulb text-orange-500 text-xl"></i><span class="absolute left-16 bg-gray-900 text-white text-xs font-bold px-4 py-2 rounded-xl opacity-0 group-hover:opacity-100 transition-all pointer-events-none whitespace-nowrap">Karya Guru</span></a>
    </nav>

    <header class="bg-white shadow-sm p-4 pl-24 relative z-40">
        <div class="flex items-center gap-4">
            <img src="logo.png" alt="Logo" class="h-12 w-auto">
            <h1 class="text-xl md:text-2xl font-black text-blue-800 uppercase tracking-tight">SDIT Qurratu A'yun Al-Islami</h1>
        </div>
    </header>

    <main class="min-h-[80vh] flex flex-col items-center justify-center bg-gradient-to-br from-blue-600 to-indigo-900 text-white text-center p-10 relative overflow-hidden ml-16">
        <div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
        <div class="relative z-10">
            <h2 class="text-5xl md:text-7xl font-black mb-6 drop-shadow-2xl">Selamat Datang</h2>
            <p class="text-xl md:text-2xl font-medium opacity-90 mb-8 tracking-widest uppercase">Di Portal Informasi Pendidikan Kami</p>
            <div class="inline-block bg-white/20 backdrop-blur-md border border-white/30 px-8 py-4 rounded-full shadow-2xl">
                <p id="txtSlogan" class="text-xl md:text-3xl font-bold text-yellow-300 italic">Cerdas, Bertauhid, dan Berakhlak Mulia</p>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwWPntN4_oJssDtiuUtC7ipHYDjCeqdrEeYHuCfUXQ03Vl5OmJQ3JdZJP9e_zyMx1dy/exec"; 
        async function fetchData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                // Cek jika elemen slogan ada di halaman ini
                if(document.getElementById('txtSlogan')) {
                    document.getElementById('txtSlogan').innerText = data.profil.slogan || "Cerdas, Bertauhid, dan Berakhlak Mulia";
                }
            } catch (err) { console.error(err); }
        }
        document.addEventListener('DOMContentLoaded', fetchData);
        <footer class="bg-gray-900 text-white py-10 text-center mt-12 relative z-40">
        <p class="text-lg font-bold">SDIT Qurratu A'yun Al-Islami</p>
        <button onclick="masukCMS()" class="mt-4 text-gray-500 text-xs hover:text-blue-400 transition flex items-center justify-center mx-auto gap-2">
            <i class="fas fa-cog"></i> Panel Admin
        </button>
    </footer>
    <script>
        function masukCMS() {
            const pw = prompt("Masukkan Sandi Akses Admin:");
            if(pw === "rahasia123") window.location.href = 'admin.html';
            else if(pw) alert("Sandi Salah!");
        }
       </script>
</body>
</html>
