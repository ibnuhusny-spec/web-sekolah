<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beranda - SDIT Qurratu A'yun Al-Islami</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .menu-3d { transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s; }
        .menu-3d:hover { transform: perspective(500px) translateZ(20px) translateY(-5px) rotateX(5deg) rotateY(-5deg); box-shadow: -10px 15px 25px rgba(0,0,0,0.2); }
        /* Animasi Iklan Berjalan */
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-marquee { display: inline-block; animation: marquee 25s linear infinite; }
        .animate-marquee:hover { animation-play-state: paused; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans flex flex-col min-h-screen">

    <nav class="fixed left-4 top-1/2 transform -translate-y-1/2 z-50 flex flex-col gap-3">
        <a href="index.html" class="menu-3d group relative flex items-center justify-center w-14 h-14 bg-blue-600 rounded-2xl shadow-lg border border-blue-500"><i class="fas fa-home text-white text-xl"></i></a>
        <a href="profil.html" class="menu-3d group relative flex items-center justify-center w-14 h-14 bg-white/90 backdrop-blur-md rounded-2xl shadow-lg border border-white"><i class="fas fa-flag text-yellow-500 text-xl"></i></a>
        <a href="pegawai.html" class="menu-3d group relative flex items-center justify-center w-14 h-14 bg-white/90 backdrop-blur-md rounded-2xl shadow-lg border border-white"><i class="fas fa-users text-green-500 text-xl"></i></a>
        <a href="kelas.html" class="menu-3d group relative flex items-center justify-center w-14 h-14 bg-white/90 backdrop-blur-md rounded-2xl shadow-lg border border-white"><i class="fas fa-chalkboard-teacher text-purple-500 text-xl"></i></a>
        <a href="karya.html" class="menu-3d group relative flex items-center justify-center w-14 h-14 bg-white/90 backdrop-blur-md rounded-2xl shadow-lg border border-white"><i class="fas fa-lightbulb text-orange-500 text-xl"></i></a>
        <a href="berita.html" class="menu-3d group relative flex items-center justify-center w-14 h-14 bg-white/90 backdrop-blur-md rounded-2xl shadow-lg border border-white"><i class="fas fa-newspaper text-red-500 text-xl"></i></a>
    </nav>

    <header class="bg-white shadow-sm p-4 pl-24 relative z-40">
        <div class="flex items-center gap-4">
            <img src="logo.png" alt="Logo" class="h-12 w-auto">
            <h1 class="text-xl md:text-2xl font-black text-blue-800 uppercase tracking-tight">SDIT Qurratu A'yun Al-Islami</h1>
        </div>
    </header>

    <div class="bg-yellow-400 overflow-hidden py-2 shadow-inner relative z-30">
        <div class="flex whitespace-nowrap animate-marquee" id="tickerContent">
            <span class="mx-4 font-bold text-blue-900 italic"><i class="fas fa-spinner fa-spin mr-2"></i> Memuat kabar terbaru dari sekolah...</span>
        </div>
    </div>

    <main class="flex-1 flex flex-col items-center justify-center bg-gradient-to-br from-blue-600 to-indigo-900 text-white text-center p-10 relative overflow-hidden ml-16">
        <div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
        <div class="relative z-10">
            <h2 class="text-5xl md:text-7xl font-black mb-6 drop-shadow-2xl">Selamat Datang</h2>
            <p class="text-xl md:text-2xl font-medium opacity-90 mb-8 tracking-widest uppercase">Di Portal Informasi Pendidikan Kami</p>
            <div class="inline-block bg-white/20 backdrop-blur-md border border-white/30 px-8 py-4 rounded-full shadow-2xl">
                <p id="txtSlogan" class="text-xl md:text-3xl font-bold text-yellow-300 italic">Cerdas, Bertauhid, dan Berakhlak Mulia</p>
            </div>
        </div>
    </main>

    <footer class="bg-gray-900 text-white py-10 text-center relative z-40">
        <p class="text-lg font-bold">SDIT Qurratu A'yun Al-Islami</p>
        <button onclick="masukCMS()" class="mt-4 text-gray-500 text-xs hover:text-blue-400 transition flex items-center justify-center mx-auto gap-2"><i class="fas fa-cog"></i> Panel Admin</button>
    </footer>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwWPntN4_oJssDtiuUtC7ipHYDjCeqdrEeYHuCfUXQ03Vl5OmJQ3JdZJP9e_zyMx1dy/exec"; // JANGAN LUPA GANTI INI

        async function fetchData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                if(document.getElementById('txtSlogan')) {
                    document.getElementById('txtSlogan').innerText = data.profil.slogan || "Cerdas, Bertauhid, dan Berakhlak Mulia";
                }

                // Render Iklan Berjalan
                const ticker = document.getElementById('tickerContent');
                let content = "";
                let items = [];
                if(data.berita) items = items.concat(data.berita.slice(0, 3));
                if(data.karya) items = items.concat(data.karya.slice(0, 3));

                if(items.length > 0) {
                    items.forEach(item => {
                        const link = item.penulis ? 'karya.html' : 'berita.html';
                        const icon = item.penulis ? '<i class="fas fa-lightbulb text-orange-600"></i>' : '<i class="fas fa-fire text-red-600"></i>';
                        content += `<a href="${link}" class="mx-10 text-blue-900 font-bold hover:text-red-600 transition">${icon} ${item.judul} </a>`;
                    });
                    ticker.innerHTML = content + content; // Diduplikasi agar animasinya mulus tidak terputus
                } else {
                    ticker.innerHTML = '<span class="mx-4 font-bold text-blue-900 italic">Belum ada pembaruan terbaru...</span>';
                }

            } catch (err) { console.error(err); }
        }

        document.addEventListener('DOMContentLoaded', fetchData);
        function masukCMS() { window.location.href = 'login.html'; }
    </script>
</body>
</html>
