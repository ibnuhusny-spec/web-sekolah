<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berita - SDIT Qurratu A'yun</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .menu-3d { transition: transform 0.3s, box-shadow 0.3s; }
        .menu-3d:hover { transform: perspective(500px) translateZ(20px) translateY(-5px); box-shadow: -10px 15px 25px rgba(0,0,0,0.2); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.5s ease forwards; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-marquee { display: inline-block; animation: marquee 25s linear infinite; }
        .animate-marquee:hover { animation-play-state: paused; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans flex flex-col min-h-screen">

    <nav class="fixed bottom-4 left-1/2 transform -translate-x-1/2 md:-translate-x-0 md:left-4 md:top-1/2 md:-translate-y-1/2 z-50 flex flex-row md:flex-col gap-2 md:gap-3 bg-slate-900/90 md:bg-transparent backdrop-blur-xl px-4 py-3 md:p-0 rounded-full md:rounded-none shadow-2xl md:shadow-none w-[95%] md:w-auto justify-between md:justify-start overflow-x-auto md:overflow-visible">
        <a href="index.html" class="menu-3d flex items-center justify-center w-12 h-12 md:w-14 md:h-14 bg-white/90 rounded-2xl shadow-lg border"><i class="fas fa-home text-blue-600 text-lg md:text-xl"></i></a>
        <a href="profil.html" class="menu-3d flex items-center justify-center w-12 h-12 md:w-14 md:h-14 bg-white/90 rounded-2xl shadow-lg border"><i class="fas fa-flag text-yellow-500 text-lg md:text-xl"></i></a>
        <a href="pegawai.html" class="menu-3d flex items-center justify-center w-12 h-12 md:w-14 md:h-14 bg-white/90 rounded-2xl shadow-lg border"><i class="fas fa-users text-green-500 text-lg md:text-xl"></i></a>
        <a href="kelas.html" class="menu-3d flex items-center justify-center w-12 h-12 md:w-14 md:h-14 bg-white/90 rounded-2xl shadow-lg border"><i class="fas fa-chalkboard-teacher text-purple-500 text-lg md:text-xl"></i></a>
        <a href="karya.html" class="menu-3d flex items-center justify-center w-12 h-12 md:w-14 md:h-14 bg-white/90 rounded-2xl shadow-lg border"><i class="fas fa-lightbulb text-orange-500 text-lg md:text-xl"></i></a>
        <a href="berita.html" class="menu-3d flex items-center justify-center w-12 h-12 md:w-14 md:h-14 bg-red-600 rounded-2xl shadow-lg border-red-500"><i class="fas fa-newspaper text-white text-lg md:text-xl"></i></a>
        <a href="redaksi.html" class="menu-3d flex items-center justify-center w-12 h-12 md:w-14 md:h-14 bg-white/90 rounded-2xl shadow-lg border"><i class="fas fa-id-badge text-indigo-600 text-lg md:text-xl"></i></a>
    </nav>

    <header class="bg-white shadow-sm p-4 md:pl-24 relative z-40 flex flex-col md:flex-row justify-center md:justify-start items-center"><div class="flex items-center gap-4"><img src="logo.png" class="h-12 w-auto" onerror="this.style.display='none'"><h1 class="text-xl md:text-2xl font-black text-blue-800 uppercase tracking-tight">SDIT Qurratu A'yun Al-Islami</h1></div></header>

    <div class="bg-yellow-400 overflow-hidden py-2 shadow-inner relative z-30">
        <div class="flex whitespace-nowrap animate-marquee" id="tickerContent"><span class="mx-4 font-bold text-blue-900 italic"><i class="fas fa-spinner fa-spin mr-2"></i> Memuat kabar terbaru...</span></div>
    </div>

    <main class="flex-1 px-4 py-10 pb-28 md:p-10 md:pb-10 md:ml-16 bg-gradient-to-br from-red-50 to-orange-50 min-h-screen">
        <div class="max-w-6xl mx-auto">
            <h2 class="text-3xl md:text-4xl font-black mb-4 text-gray-800 border-l-8 border-red-600 pl-4">Kabar Sekolah</h2>
            <p class="text-gray-500 mb-10 md:ml-6">Informasi, pengumuman, dan berita terbaru seputar kegiatan sekolah.</p>

            <div class="columns-1 md:columns-2 lg:columns-3 gap-8 md:ml-6 space-y-8" id="beritaGrid">
                <div class="text-gray-500 italic"><i class="fas fa-spinner fa-spin mr-2"></i> Mengambil data dari Firebase...</div>
            </div>
        </div>
    </main>

    <footer class="bg-gray-900 text-white pt-10 pb-36 md:py-10 text-center relative z-40">
        <p class="text-lg font-bold">SDIT Qurratu A'yun Al-Islami</p>
        <button onclick="masukCMS()" class="mt-6 mb-4 md:mb-0 text-gray-400 border border-gray-700 px-5 py-2 rounded-full text-xs hover:bg-gray-800 hover:text-white transition flex items-center justify-center mx-auto gap-2 shadow-sm">
            <i class="fas fa-cog"></i> Panel Admin
        </button>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMTI0R0xGEWFSOAhzDZdJxnuX8hixBP7M",
            authDomain: "websekolah-9bcde.firebaseapp.com",
            projectId: "websekolah-9bcde",
            storageBucket: "websekolah-9bcde.firebasestorage.app",
            messagingSenderId: "113406929634",
            appId: "1:113406929634:web:df2b9dc1a45fecf0bc0cbb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.masukCMS = function() { window.location.href = 'login.html'; }
        function formatTanggal(iso) { try { return new Date(iso).toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'}); } catch{ return iso; } }

        async function loadData() {
            try {
                const [beritaSnap, karyaSnap] = await Promise.all([ getDocs(collection(db, "berita")), getDocs(collection(db, "karya")) ]);

                // Ticker
                const ticker = document.getElementById('tickerContent');
                
                // --- INI BAGIAN YANG DIPERBAIKI ---
                let berita = beritaSnap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => b.tanggal.localeCompare(a.tanggal));
                let karya = karyaSnap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => b.tanggal.localeCompare(a.tanggal));
                // ----------------------------------

                let items = [...berita.slice(0,3), ...karya.slice(0,3)];
                
                if(items.length > 0) {
                    let content = items.map(item => `<a href="${item.penulis ? 'karya.html' : 'berita.html'}" class="mx-10 text-blue-900 font-bold hover:text-red-600 transition"><i class="fas ${item.penulis ? 'fa-lightbulb text-orange-600' : 'fa-fire text-red-600'}"></i> ${item.judul} </a>`).join('');
                    ticker.innerHTML = content + content;
                } else { ticker.innerHTML = '<span class="mx-4 font-bold text-blue-900 italic">Belum ada pembaruan...</span>'; }

                // Grid Berita
                const grid = document.getElementById('beritaGrid');
                if(berita.length === 0) { grid.innerHTML = `<div class="text-center py-10 text-gray-400">Belum ada berita.</div>`; return; }

                grid.innerHTML = berita.map((b, i) => {
                    const isNoImg = !b.gambar || b.gambar === "-";
                    let html = `<div class="break-inside-avoid animate-fade shadow-lg hover:shadow-2xl transition duration-300 rounded-3xl overflow-hidden bg-white flex flex-col h-full relative" style="animation-delay: ${i*0.1}s">`;
                    
                    if (!isNoImg) html += `<div class="relative max-h-56 overflow-hidden"><img src="${b.gambar}" class="w-full object-cover h-48"><span class="absolute top-4 left-4 bg-red-600 text-white text-[10px] font-bold px-3 py-1 rounded-full shadow-md uppercase tracking-wider">${b.kategori}</span></div>`;
                    
                    html += `<div class="p-6 flex-1 flex flex-col ${isNoImg ? 'border-t-8 border-red-600' : ''}">
                                ${isNoImg ? `<span class="bg-red-100 text-red-600 text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-wider mb-4 inline-block w-max">${b.kategori}</span>` : ''}
                                <h3 class="text-2xl font-black text-gray-800 mb-3 leading-tight">${b.judul}</h3>
                                
                                <p class="text-gray-600 mb-5 leading-relaxed line-clamp-3">${b.isi}</p>
                                
                                <a href="baca.html?id=${b.id}&type=berita" class="mb-6 bg-red-50 hover:bg-red-600 text-red-600 hover:text-white border border-red-100 py-3 rounded-xl font-bold text-center transition duration-300 text-sm flex justify-center items-center gap-2">
                                    BACA SELENGKAPNYA <i class="fas fa-arrow-right"></i>
                                </a>

                                <div class="flex items-center gap-3 mt-auto pt-4 border-t border-gray-100">
                                    <div class="w-10 h-10 rounded-full bg-red-50 flex items-center justify-center text-red-500"><i class="fas fa-calendar-alt"></i></div>
                                    <div><p class="font-bold text-sm text-gray-800">Diterbitkan</p><p class="text-xs text-gray-500">${formatTanggal(b.tanggal)}</p></div>
                                </div>
                            </div></div>`;
                            
                    return html;
                }).join('');

            } catch (err) { console.error(err); }
        }
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
