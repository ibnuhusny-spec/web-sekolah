<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - SDIT Qurratu A'yun</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-blue-900 to-slate-900 h-screen flex items-center justify-center p-4">

    <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-sm text-center relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-2 bg-blue-500"></div>
        <img src="logo.png" alt="Logo" class="h-20 mx-auto mb-6 drop-shadow-md">
        <h2 class="text-2xl font-black text-gray-800 mb-2 uppercase tracking-widest">Ruang Admin</h2>
        <p class="text-sm text-gray-500 mb-8">Masukkan sandi rahasia Anda</p>
        
        <div class="relative mb-6">
            <i class="fas fa-lock absolute left-4 top-4 text-gray-400"></i>
            <input type="password" id="inputSandi" placeholder="Sandi Keamanan" class="w-full pl-12 p-4 border-2 rounded-xl bg-gray-50 outline-none focus:border-blue-500 font-bold tracking-widest transition" onkeypress="if(event.key === 'Enter') cekSandi()">
        </div>
        
        <p id="pesanError" class="text-red-500 text-xs font-bold mb-4 hidden"><i class="fas fa-exclamation-triangle mr-1"></i> Sandi yang Anda masukkan salah!</p>
        
        <button onclick="cekSandi()" id="btnLogin" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl shadow-lg transition"><i class="fas fa-sign-in-alt mr-2"></i> MASUK KE CMS</button>
        <a href="index.html" class="block mt-6 text-sm text-gray-400 hover:text-gray-600 transition"><i class="fas fa-arrow-left mr-1"></i> Kembali ke Beranda</a>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwWPntN4_oJssDtiuUtC7ipHYDjCeqdrEeYHuCfUXQ03Vl5OmJQ3JdZJP9e_zyMx1dy/exec"; // GANTI DENGAN URL ANDA

        async function cekSandi() {
            const btn = document.getElementById('btnLogin');
            const sandi = document.getElementById('inputSandi').value;
            if(!sandi) return;

            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> MEMERIKSA...';
            btn.disabled = true; document.getElementById('pesanError').classList.add('hidden');

            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "cek_sandi", sandi: sandi }) });
                const data = await res.json();
                
                if(data.status === "success") {
                    localStorage.setItem("admin_token", "sah"); // Menyimpan izin masuk
                    window.location.href = "admin.html";
                } else {
                    document.getElementById('pesanError').classList.remove('hidden');
                }
            } catch (err) { alert("Gagal menghubungi server."); } 
            finally { btn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i> MASUK KE CMS'; btn.disabled = false; }
        }
    </script>
</body>
</html>
