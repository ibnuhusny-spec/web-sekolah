<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - SDIT Qurratu A'yun</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-blue-900 to-slate-900 h-screen flex items-center justify-center p-4">

    <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-sm text-center relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-2 bg-blue-500"></div>
        <img src="logo.png" alt="Logo" class="h-20 mx-auto mb-6 drop-shadow-md" onerror="this.style.display='none'">
        <h2 class="text-2xl font-black text-gray-800 mb-2 uppercase tracking-widest">Ruang Admin</h2>
        <p class="text-sm text-gray-500 mb-8">Sistem Keamanan Super Admin</p>
        
        <p id="pesanStatus" class="text-red-500 text-xs font-bold mb-4 hidden bg-red-50 p-3 rounded-lg border border-red-100"></p>
        
        <button onclick="prosesLoginSuperAdmin()" id="btnLogin" class="w-full bg-white border-2 border-gray-200 hover:border-blue-500 hover:bg-blue-50 text-gray-700 font-black py-4 rounded-xl shadow-sm transition flex items-center justify-center gap-3">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5">
            VERIFIKASI GOOGLE
        </button>

        <a href="index.html" class="block mt-6 text-sm text-gray-400 hover:text-gray-600 transition"><i class="fas fa-arrow-left mr-1"></i> Kembali ke Beranda</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMTI0R0xGEWFSOAhzDZdJxnuX8hixBP7M",
            authDomain: "websekolah-9bcde.firebaseapp.com",
            projectId: "websekolah-9bcde",
            storageBucket: "websekolah-9bcde.firebasestorage.app",
            messagingSenderId: "113406929634",
            appId: "1:113406929634:web:df2b9dc1a45fecf0bc0cbb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // GANTI DENGAN EMAIL ASLI BAPAK (Harus sama persis dengan yang di Firebase Rules)
        const EMAIL_SUPER_ADMIN = "ibnuhusny@gmail.com";

        window.prosesLoginSuperAdmin = async function() {
            const btn = document.getElementById('btnLogin');
            const pesan = document.getElementById('pesanStatus');
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2 text-blue-600"></i> MEMERIKSA...';
            btn.disabled = true; 
            pesan.classList.add('hidden');

            try {
                // Munculkan Popup Google Login
                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                // Cek KTP (Email) yang barusan login
                if(user.email === EMAIL_SUPER_ADMIN) {
                    pesan.className = "text-green-600 text-xs font-bold mb-4 block bg-green-50 p-3 rounded-lg border border-green-100";
                    pesan.innerHTML = '<i class="fas fa-check-circle mr-1"></i> Akses Diterima! Mengalihkan...';
                    
                    // Alihkan ke halaman admin Bapak
                    setTimeout(() => {
                        window.location.href = "admin.html";
                    }, 1000);
                } else {
                    // Jika email salah, usir (Sign Out) dan beri peringatan
                    await signOut(auth);
                    pesan.className = "text-red-500 text-xs font-bold mb-4 block bg-red-50 p-3 rounded-lg border border-red-100";
                    pesan.innerHTML = '<i class="fas fa-exclamation-triangle mr-1"></i> Maaf, ini bukan akun Admin.';
                }
            } catch (err) { 
                pesan.className = "text-red-500 text-xs font-bold mb-4 block bg-red-50 p-3 rounded-lg border border-red-100";
                pesan.innerHTML = '<i class="fas fa-times-circle mr-1"></i> Gagal login: ' + err.message;
            } finally { 
                btn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5"> VERIFIKASI GOOGLE'; 
                btn.disabled = false; 
            }
        }
    </script>
</body>
</html>
