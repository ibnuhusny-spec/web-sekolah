<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Sekolah - SDIT Qurratu A'yun</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 font-sans pb-20">

    <nav class="fixed bottom-4 left-1/2 transform -translate-x-1/2 z-50 flex gap-2 bg-slate-900/90 backdrop-blur-xl px-4 py-3 rounded-full shadow-2xl">
        <a href="index.html" class="w-10 h-10 bg-white flex items-center justify-center rounded-xl shadow"><i class="fas fa-home text-blue-600"></i></a>
        <a href="profil.html" class="w-10 h-10 bg-yellow-500 flex items-center justify-center rounded-xl shadow text-white"><i class="fas fa-flag"></i></a>
        <a href="pegawai.html" class="w-10 h-10 bg-white flex items-center justify-center rounded-xl shadow"><i class="fas fa-users text-green-600"></i></a>
        <a href="kelas.html" class="w-10 h-10 bg-white flex items-center justify-center rounded-xl shadow"><i class="fas fa-school text-purple-600"></i></a>
    </nav>

    <header class="bg-white shadow-sm p-4 flex items-center gap-4">
        <img src="logo.png" class="h-10 w-auto" onerror="this.style.display='none'">
        <h1 class="text-xl font-black text-blue-800 uppercase italic">SDIT Qurratu A'yun Al-Islami</h1>
    </header>

    <main class="max-w-4xl mx-auto p-6 mt-6">
        <div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border-t-[12px] border-yellow-400">
            <div class="p-8 md:p-12">
                <h2 class="text-3xl font-black text-gray-800 mb-8 border-l-8 border-yellow-400 pl-4 uppercase italic">Visi, Misi & Tujuan</h2>
                
                <div id="profil_loading" class="text-gray-400 italic py-10 text-center"><i class="fas fa-spinner fa-spin mr-2"></i> Mengambil data profil...</div>
                
                <div id="profil_content" class="hidden space-y-10 animate-fade-in">
                    <div>
                        <h3 class="text-lg font-black text-yellow-600 mb-3 flex items-center gap-2"><i class="fas fa-eye"></i> VISI SEKOLAH</h3>
                        <p id="v_visi" class="text-gray-600 leading-relaxed bg-yellow-50 p-6 rounded-3xl italic font-medium"></p>
                    </div>

                    <div>
                        <h3 class="text-lg font-black text-blue-700 mb-3 flex items-center gap-2"><i class="fas fa-rocket"></i> MISI SEKOLAH</h3>
                        <div id="v_misi" class="text-gray-600 leading-relaxed prose prose-slate whitespace-pre-line ml-4"></div>
                    </div>

                    <div>
                        <h3 class="text-lg font-black text-green-600 mb-3 flex items-center gap-2"><i class="fas fa-bullseye"></i> TUJUAN SEKOLAH</h3>
                        <div id="v_tujuan" class="text-gray-600 leading-relaxed prose prose-slate whitespace-pre-line ml-4"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAMTI0R0xGEWFSOAhzDZdJxnuX8hixBP7M", authDomain: "websekolah-9bcde.firebaseapp.com", projectId: "websekolah-9bcde", storageBucket: "websekolah-9bcde.firebasestorage.app", messagingSenderId: "113406929634", appId: "1:113406929634:web:df2b9dc1a45fecf0bc0cbb" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadProfil() {
            try {
                const snap = await getDoc(doc(db, "profil", "sekolah"));
                if (snap.exists()) {
                    const data = snap.data();
                    document.getElementById('v_visi').innerText = data.visi || "-";
                    document.getElementById('v_misi').innerText = data.misi || "-";
                    document.getElementById('v_tujuan').innerText = data.tujuan || "-";
                    document.getElementById('profil_loading').classList.add('hidden');
                    document.getElementById('profil_content').classList.remove('hidden');
                }
            } catch (e) { console.error(e); }
        }
        loadProfil();
    </script>
</body>
</html>
