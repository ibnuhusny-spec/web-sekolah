    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let path = window.location.pathname;
            let page = path.split("/").pop().replace(".html", "");
            if(page === "" || page === "index") page = "index";
            if(page === "baca") {
                const urlParams = new URLSearchParams(window.location.search);
                page = urlParams.get('type') || 'berita';
            }
            const activeColors = { "index": "bg-blue-600 border-blue-500", "profil": "bg-yellow-500 border-yellow-400", "pegawai": "bg-green-500 border-green-400", "kelas": "bg-purple-500 border-purple-400", "ppdb": "bg-emerald-500 border-emerald-400", "pustaka": "bg-cyan-600 border-cyan-500", "karya": "bg-orange-500 border-orange-400", "berita": "bg-red-600 border-red-500", "redaksi": "bg-indigo-600 border-indigo-500" };
            let targetBtn = document.querySelector(`.nav-btn[data-page="${page}"]`);
            if(targetBtn && activeColors[page]) {
                targetBtn.classList.remove("bg-white/90");
                let colorClasses = activeColors[page].split(" ");
                targetBtn.classList.add(...colorClasses);
                let icon = targetBtn.querySelector("i");
                icon.className = icon.className.replace(/text-\w+-\d+/g, "text-white");
            }
        });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMTI0R0xGEWFSOAhzDZdJxnuX8hixBP7M",
            authDomain: "websekolah-9bcde.firebaseapp.com",
            projectId: "websekolah-9bcde",
            storageBucket: "websekolah-9bcde.firebasestorage.app",
            messagingSenderId: "113406929634",
            appId: "1:113406929634:web:df2b9dc1a45fecf0bc0cbb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadData() {
            try {
                // Fetch Ticker
                const [beritaSnap, karyaSnap] = await Promise.all([ getDocs(collection(db, "berita")), getDocs(collection(db, "karya")) ]);
                const ticker = document.getElementById('tickerContent');
                let items = [...beritaSnap.docs.map(d => ({...d.data()})).slice(0,3), ...karyaSnap.docs.map(d => ({...d.data()})).slice(0,3)];
                if(items.length > 0) {
                    ticker.innerHTML = items.map(item => `<a href="${item.penulis ? 'karya.html' : 'berita.html'}" class="mx-10 text-blue-900 font-bold hover:text-red-600 transition uppercase italic text-xs tracking-tight"><i class="fas ${item.penulis ? 'fa-lightbulb text-orange-600' : 'fa-fire text-red-600'}"></i> ${item.judul} </a>`).join('') + ticker.innerHTML;
                } else {
                    ticker.innerHTML = '<span class="mx-4 font-bold text-blue-900 italic uppercase">Belum ada pembaruan...</span>';
                }

                // Fetch Visi Misi Tujuan
                const snap = await getDoc(doc(db, "profil", "sekolah"));
                if(snap.exists()) {
                    const d = snap.data();
                    
                    document.getElementById('txtVisi').innerText = d.visi || "Data Visi belum diisi.";
                    
                    const formatList = (text) => {
                        if (!text) return "-";
                        const poin = text.split('\n').filter(t => t.trim() !== '');
                        return "<ul class='list-decimal pl-5 space-y-3'>" + poin.map(p => `<li>${p}</li>`).join('') + "</ul>";
                    };

                    document.getElementById('txtMisi').innerHTML = formatList(d.misi);
                    document.getElementById('txtTujuan').innerHTML = formatList(d.tujuan);
                } else {
                    document.getElementById('txtVisi').innerText = "Silakan isi data Visi di Panel Admin.";
                    document.getElementById('txtMisi').innerText = "Silakan isi data Misi di Panel Admin.";
                    document.getElementById('txtTujuan').innerText = "Silakan isi data Tujuan di Panel Admin.";
                }

            } catch (err) { console.error(err); }
        }

        document.addEventListener('DOMContentLoaded', loadData);
    </script>
