<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - SDIT Qurratu A'yun Al-Islami</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .menu-3d { transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s; }
        .menu-3d:hover { transform: perspective(500px) translateZ(20px) translateY(-5px) rotateX(5deg) rotateY(-5deg); box-shadow: -10px 15px 25px rgba(0,0,0,0.2); }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <nav class="fixed left-4 top-1/2 transform -translate-y-1/2 z-50 flex flex-col gap-4">
        <a href="index.html" class="menu-3d group relative flex items-center justify-center w-14 h-14 bg-white/90 backdrop-blur-md rounded-2xl shadow-[5px_5px_15px_rgba(0,0,0,0.15)] border border-white"><i class="fas fa-home text-blue-600 text-xl"></i><span class="absolute left-16 bg-gray-900 text-white text-xs font-bold px-4 py-2 rounded-xl opacity-0 group-hover:opacity-100 transition-all pointer-events-none whitespace-nowrap shadow-xl">Beranda</span></a>
        <a href="profil.html" class="menu-3d group relative flex items-center justify-center w-14 h-14 bg-white/90 backdrop-blur-md rounded-2xl shadow-[5px_5px_15px_rgba(0,0,0,0.15)] border border-white"><i class="fas fa-flag text-yellow-500 text-xl"></i><span class="absolute left-16 bg-gray-900 text-white text-xs font-bold px-4 py-2 rounded-xl opacity-0 group-hover:opacity-100 transition-all pointer-events-none whitespace-nowrap shadow-xl">Profil Sekolah</span></a>
        <a href="pegawai.html" class="menu-3d group relative flex items-center justify-center w-14 h-14 bg-white/90 backdrop-blur-md rounded-2xl shadow-[5px_5px_15px_rgba(0,0,0,0.15)] border border-white"><i class="fas fa-users text-green-500 text-xl"></i><span class="absolute left-16 bg-gray-900 text-white text-xs font-bold px-4 py-2 rounded-xl opacity-0 group-hover:opacity-100 transition-all pointer-events-none whitespace-nowrap shadow-xl">Guru & Pegawai</span></a>
        <a href="kelas.html" class="menu-3d group relative flex items-center justify-center w-14 h-14 bg-white/90 backdrop-blur-md rounded-2xl shadow-[5px_5px_15px_rgba(0,0,0,0.15)] border border-white"><i class="fas fa-chalkboard-teacher text-purple-500 text-xl"></i><span class="absolute left-16 bg-gray-900 text-white text-xs font-bold px-4 py-2 rounded-xl opacity-0 group-hover:opacity-100 transition-all pointer-events-none whitespace-nowrap shadow-xl">Data Kelas</span></a>
    </nav>

    <header class="bg-white shadow-sm p-4 pl-24"><div class="flex items-center gap-4"><img src="logo.png" class="h-12 w-auto"><h1 class="text-xl md:text-2xl font-black text-blue-800 uppercase tracking-tight">SDIT Qurratu A'yun Al-Islami</h1></div></header>

    <main class="ml-20 p-10 min-h-screen">
        <h2 class="text-4xl font-black mb-10 text-gray-800 border-l-8 border-yellow-500 pl-4">Profil Sekolah</h2>
        <div class="grid md:grid-cols-3 gap-8">
            <div class="bg-white p-8 rounded-3xl shadow-xl border-t-8 border-blue-600">
                <h3 class="text-2xl font-bold mb-4 text-blue-700"><i class="fas fa-eye mr-2"></i>Visi</h3>
                <div id="txtVisi" class="text-gray-600 h-64 overflow-y-auto custom-scroll text-justify italic pr-2">Sinkronisasi data...</div>
            </div>
            <div class="bg-white p-8 rounded-3xl shadow-xl border-t-8 border-yellow-500">
                <h3 class="text-2xl font-bold mb-4 text-yellow-600"><i class="fas fa-bullseye mr-2"></i>Misi</h3>
                <div id="txtMisi" class="text-gray-600 h-64 overflow-y-auto custom-scroll pr-2">Sinkronisasi data...</div>
            </div>
            <div class="bg-white p-8 rounded-3xl shadow-xl border-t-8 border-green-500">
                <h3 class="text-2xl font-bold mb-4 text-green-700"><i class="fas fa-chart-line mr-2"></i>Tujuan</h3>
                <div id="txtTujuan" class="text-gray-600 h-64 overflow-y-auto custom-scroll pr-2">Sinkronisasi data...</div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwWPntN4_oJssDtiuUtC7ipHYDjCeqdrEeYHuCfUXQ03Vl5OmJQ3JdZJP9e_zyMx1dy/exec"; 
        async function fetchData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                document.getElementById('txtVisi').innerText = (data.profil.visi || "-").replace(/[\r\n]+/g, ' ');
                
                function formatList(teks) {
                    if (!teks || teks === "-") return "-";
                    let poin = teks.split(/[\r\n]+/).map(p => p.trim()).filter(p => p.length > 0);
                    return "<ul class='list-disc pl-5 space-y-2'>" + poin.map(p => `<li>${p}</li>`).join('') + "</ul>";
                }

                document.getElementById('txtMisi').innerHTML = formatList(data.profil.misi);
                document.getElementById('txtTujuan').innerHTML = formatList(data.profil.tujuan);
            } catch (err) { console.error(err); }
        }
        document.addEventListener('DOMContentLoaded', fetchData);
    </script>
</body>
</html>
